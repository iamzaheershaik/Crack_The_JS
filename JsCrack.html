<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Interview MCQ — 327 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0f;--surface:#141418;--surface2:#1c1c22;--border:#2a2a35;
  --accent:#f7df1e;--accent2:#00d8ff;--text:#e8e8f0;--muted:#6b6b80;
  --green:#00ff88;--red:#ff4a6a;--orange:#ff9500;--purple:#b06aff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#1a1a24,#0d0d0f);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:.7rem}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.8rem;color:#000}
.logo-text{font-size:1rem;font-weight:700;letter-spacing:-.02em}
.logo-text span{color:var(--accent)}
.hstats{display:flex;gap:1rem;align-items:center}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.28rem .65rem;font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.chip b{color:var(--accent)}
.layout{display:flex;height:calc(100vh - 57px)}
/* SIDEBAR */
.sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-sec{padding:1rem;border-bottom:1px solid var(--border)}
.sb-lbl{font-size:.63rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.6rem;font-weight:700}
.fbtn{background:none;border:1px solid transparent;border-radius:6px;padding:.42rem .7rem;font-family:'Syne',sans-serif;font-size:.78rem;color:var(--muted);cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;justify-content:space-between;width:100%}
.fbtn:hover{background:var(--surface2);color:var(--text)}
.fbtn.active{background:var(--surface2);border-color:var(--accent);color:var(--accent);font-weight:600}
.fc{font-family:'JetBrains Mono',monospace;font-size:.68rem;background:var(--border);padding:.1rem .35rem;border-radius:4px}
.ddot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:.45rem}
.prog-sec{padding:1rem;border-bottom:1px solid var(--border)}
.prog-outer{background:var(--border);border-radius:4px;height:5px;margin-top:.45rem;overflow:hidden}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease;width:0}
.prog-txt{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:.35rem;font-family:'JetBrains Mono',monospace}
.score-sec{padding:.8rem 1rem}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.sbox{background:var(--surface2);border-radius:8px;padding:.55rem;text-align:center;border:1px solid var(--border)}
.sval{font-size:1.35rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.slbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.sval.g{color:var(--green)}.sval.r{color:var(--red)}.sval.y{color:var(--accent)}
.srch{padding:.65rem;border-bottom:1px solid var(--border)}
.srch input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.45rem .7rem;color:var(--text);font-family:'Syne',sans-serif;font-size:.78rem;outline:none;transition:border-color .15s}
.srch input:focus{border-color:var(--accent)}
.srch input::placeholder{color:var(--muted)}
.qlist{flex:1;overflow-y:auto;padding:.4rem}
.qlist::-webkit-scrollbar{width:3px}
.qlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.qi{display:flex;align-items:center;gap:.45rem;padding:.4rem .55rem;border-radius:6px;cursor:pointer;font-size:.76rem;transition:background .1s;color:var(--muted)}
.qi:hover{background:var(--surface2)}
.qi.cur{background:var(--surface2);border-left:2px solid var(--accent);color:var(--text)}
.qi.ok{color:var(--green)}.qi.bad{color:var(--red)}
.qnum{font-family:'JetBrains Mono',monospace;font-size:.68rem;min-width:26px}
/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.qcard{max-width:840px;margin:1.8rem auto;padding:0 1.5rem 3rem}
.qmeta{display:flex;align-items:center;gap:.55rem;margin-bottom:1.4rem;flex-wrap:wrap}
.badge{padding:.22rem .65rem;border-radius:5px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border:1px solid}
.badge.easy{color:var(--green);border-color:var(--green);background:rgba(0,255,136,.08)}
.badge.medium{color:var(--accent);border-color:var(--accent);background:rgba(247,223,30,.08)}
.badge.hard{color:var(--red);border-color:var(--red);background:rgba(255,74,106,.08)}
.badge.topic{color:var(--accent2);border-color:var(--accent2);background:rgba(0,216,255,.08)}
.badge.type{color:var(--purple);border-color:var(--purple);background:rgba(176,106,255,.08)}
.qctr{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.73rem;color:var(--muted)}
.qtxt{font-size:1.02rem;line-height:1.7;font-weight:600;margin-bottom:1.4rem}
.code-block{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.7;color:var(--accent2);overflow-x:auto;margin:.9rem 0;white-space:pre}
.opts{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.4rem}
.obtn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:flex-start;gap:.75rem;font-family:'Syne',sans-serif;font-size:.88rem;color:var(--text)}
.obtn:hover:not(:disabled){border-color:var(--accent);background:var(--surface2)}
.okey{min-width:26px;height:26px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;flex-shrink:0}
.obtn.sel{border-color:var(--accent2);background:rgba(0,216,255,.06)}
.obtn.correct{border-color:var(--green)!important;background:rgba(0,255,136,.08)!important}
.obtn.correct .okey{background:var(--green);color:#000;border-color:var(--green)}
.obtn.wrong{border-color:var(--red)!important;background:rgba(255,74,106,.08)!important}
.obtn.wrong .okey{background:var(--red);color:#fff;border-color:var(--red)}
.obtn:disabled{cursor:default}
.expl{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:1.1rem;font-size:.86rem;line-height:1.7;display:none;animation:sli .2s ease}
.expl.show{display:block}
.expl .elbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:700;margin-bottom:.45rem}
@keyframes sli{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.controls{display:flex;gap:.65rem;align-items:center;margin-top:1.4rem;flex-wrap:wrap}
.btn{padding:.65rem 1.3rem;border-radius:8px;border:none;font-family:'Syne',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn-pri{background:var(--accent);color:#000}
.btn-pri:hover{background:#ffe832}
.btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sec:hover{border-color:var(--text)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.kbd{font-family:'JetBrains Mono',monospace;font-size:.68rem;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:.08rem .35rem;color:var(--muted)}
.toast{position:fixed;bottom:1.8rem;right:1.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:.75rem 1.1rem;font-size:.83rem;z-index:999;display:none;animation:tin .2s ease}
.toast.show{display:block}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.empty{padding:2.5rem;text-align:center;color:var(--muted);font-size:.88rem}
@media(max-width:768px){.sidebar{display:none}.hstats{display:none}}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-icon">JS</div>
    <span class="logo-text">Interview <span>MCQ</span> Bank</span>
  </div>
  <div class="hstats">
    <div class="chip">Total: <b id="hTotal">0</b></div>
    <div class="chip">Answered: <b id="hAnswered">0</b></div>
    <div class="chip">Accuracy: <b id="hAccuracy">—</b></div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="prog-sec">
      <div class="sb-lbl">Session Progress</div>
      <div class="prog-outer"><div class="prog-inner" id="progBar"></div></div>
      <div class="prog-txt"><span id="progTxt">0 done</span><span id="progPct">0%</span></div>
    </div>
    <div class="score-sec">
      <div class="score-grid">
        <div class="sbox"><div class="sval g" id="sCorrect">0</div><div class="slbl">Correct</div></div>
        <div class="sbox"><div class="sval r" id="sWrong">0</div><div class="slbl">Wrong</div></div>
        <div class="sbox"><div class="sval y" id="sStreak">0</div><div class="slbl">Streak 🔥</div></div>
        <div class="sbox"><div class="sval" id="sSkipped">0</div><div class="slbl">Skipped</div></div>
      </div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Difficulty</div>
      <div id="diffFilters"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Type</div>
      <div id="typeFilters"></div>
    </div>
    <div class="sb-sec" style="overflow-y:auto;max-height:160px">
      <div class="sb-lbl">Topic</div>
      <div id="topicFilters"></div>
    </div>
    <div class="srch"><input type="text" placeholder="Search questions…" oninput="doSearch(this.value)"/></div>
    <div class="qlist" id="qList"></div>
  </aside>

  <main class="main">
    <div class="qcard">
      <div class="qmeta" id="qMeta"></div>
      <div class="qtxt" id="qTxt"></div>
      <div class="opts" id="opts"></div>
      <div class="expl" id="expl"><div class="elbl">✦ Explanation</div><div id="explTxt"></div></div>
      <div class="controls">
        <button class="btn btn-pri" id="submitBtn" onclick="submitAnswer()" disabled>Check Answer</button>
        <button class="btn btn-sec" id="nextBtn" onclick="nextQ()" style="display:none">Next →</button>
        <button class="btn btn-ghost" onclick="revealAns()">Reveal</button>
        <button class="btn btn-ghost" onclick="skipQ()" style="margin-left:auto">Skip</button>
        <span style="font-size:.72rem;color:var(--muted);margin-left:.3rem">
          <span class="kbd">A–D</span> &nbsp;<span class="kbd">Enter</span> &nbsp;<span class="kbd">→</span>
        </span>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const QS = [{"id": 1, "topic": "Core JS", "difficulty": "Easy", "type": "Output-Based", "question": "What will the following code output?\n\nconsole.log(x);\nvar x = 5;", "options": {"A": "5", "B": "ReferenceError: x is not defined", "C": "undefined", "D": "null"}, "answer": "C", "explanation": "var declarations are hoisted to the top of their scope but NOT initialized. So x exists but is undefined at the time of console.log. A is wrong because the assignment hasn't happened yet. B is wrong because var IS hoisted (unlike let/const). D is wrong because uninitialized vars are undefined, not null."}, {"id": 2, "topic": "Core JS", "difficulty": "Easy", "type": "Output-Based", "question": "What will the following code output?\n\nconsole.log(foo());\nfunction foo() { return 42; }", "options": {"A": "undefined", "B": "ReferenceError", "C": "42", "D": "TypeError"}, "answer": "C", "explanation": "Function declarations are fully hoisted \u2014 both the name AND the body. So foo() is callable before its definition. This differs from function expressions (var foo = function(){}) where only the var declaration is hoisted, not the assignment."}, {"id": 3, "topic": "Core JS", "difficulty": "Easy", "type": "Conceptual", "question": "Which of the following will throw a ReferenceError?", "options": {"A": "console.log(a); var a = 1;", "B": "console.log(b); let b = 1;", "C": "console.log(c); function c() {}", "D": "var d; console.log(d);"}, "answer": "B", "explanation": "let and const are hoisted but placed in a 'Temporal Dead Zone (TDZ)' \u2014 accessing them before declaration throws ReferenceError. A uses var, which is safely hoisted as undefined. C is a function declaration, fully hoisted. D declares var before use."}, {"id": 4, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nvar x = 1;\nfunction foo() {\n  console.log(x);\n  var x = 2;\n}\nfoo();", "options": {"A": "1", "B": "2", "C": "undefined", "D": "ReferenceError"}, "answer": "C", "explanation": "Inside foo(), var x is hoisted to the top of the function scope \u2014 NOT to the outer scope. So at the time of console.log, the local x exists but is undefined. The outer x = 1 is shadowed by the inner declaration. This is a classic hoisting trap."}, {"id": 5, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfoo();\nvar foo = function() { console.log('A'); };\nfunction foo() { console.log('B'); }", "options": {"A": "A", "B": "B", "C": "TypeError: foo is not a function", "D": "undefined"}, "answer": "B", "explanation": "During hoisting, function declarations take priority over var declarations. The function foo(){ console.log('B') } is fully hoisted first. The var foo = function... assignment only happens at runtime. By then, foo() has already been called with the hoisted function version."}, {"id": 6, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(typeof foo);\nif (true) {\n  function foo() {}\n}\nconsole.log(typeof foo);", "options": {"A": "undefined, function", "B": "function, function", "C": "undefined, undefined", "D": "Behavior varies by environment (non-strict vs strict)"}, "answer": "D", "explanation": "Block-scoped function declarations are non-standard behavior in non-strict mode. In browsers (non-strict), the function name is hoisted but the binding happens at block execution. In strict mode or Node.js modules, the function is block-scoped. This is a genuine spec ambiguity and interview trap \u2014 always mention 'it depends on the environment.'"}, {"id": 7, "topic": "Core JS", "difficulty": "Easy", "type": "Conceptual", "question": "What type of scope does JavaScript primarily use?", "options": {"A": "Dynamic scope", "B": "Block scope only", "C": "Lexical (static) scope", "D": "Function scope only"}, "answer": "C", "explanation": "JavaScript uses lexical (static) scope \u2014 a function's scope is determined by WHERE it is written in the source code, not where it is called from. Dynamic scope (used in some languages like Bash) resolves variables based on call stack. JS closures rely entirely on lexical scoping."}, {"id": 8, "topic": "Core JS", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nlet x = 'global';\nfunction test() {\n  let x = 'local';\n  console.log(x);\n}\ntest();\nconsole.log(x);", "options": {"A": "global, global", "B": "local, local", "C": "local, global", "D": "global, local"}, "answer": "C", "explanation": "The function test() has its own local scope. let x = 'local' creates a new binding inside the function. The outer x = 'global' is unaffected. First console.log sees local x, second sees global x. let does not leak out of its block/function scope."}, {"id": 9, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0);\n}", "options": {"A": "0, 1, 2", "B": "3, 3, 3", "C": "undefined, undefined, undefined", "D": "0, 0, 0"}, "answer": "B", "explanation": "var is function-scoped, so there's only ONE i shared across all iterations. By the time setTimeout callbacks run (after the loop), i has already been incremented to 3. All three callbacks reference the same i = 3. Use let instead to get 0, 1, 2 \u2014 let creates a new binding per iteration."}, {"id": 10, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfor (let i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0);\n}", "options": {"A": "3, 3, 3", "B": "0, 1, 2", "C": "0, 0, 0", "D": "undefined, undefined, undefined"}, "answer": "B", "explanation": "let is block-scoped and creates a new binding for each loop iteration. Each setTimeout callback closes over its own separate i. This is the fix to the classic var/setTimeout trap. The JavaScript spec guarantees a fresh let binding per iteration."}, {"id": 11, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nfunction outer() {\n  var x = 10;\n  function inner() {\n    var x = 20;\n    return x;\n  }\n  return inner() + x;\n}\nconsole.log(outer());", "options": {"A": "20", "B": "30", "C": "40", "D": "10"}, "answer": "B", "explanation": "inner() returns 20 (its own local x). outer's x is still 10 (unaffected by inner's x). So outer() returns 20 + 10 = 30. Each function has its own var scope \u2014 inner's x shadows outer's x only inside inner()."}, {"id": 12, "topic": "Core JS", "difficulty": "Easy", "type": "Conceptual", "question": "What is a closure in JavaScript?", "options": {"A": "A function that runs immediately after being defined", "B": "A function that has access to its own scope, the outer function's scope, and the global scope", "C": "A method that closes the browser window", "D": "A function with no return value"}, "answer": "B", "explanation": "A closure is formed when a function retains access to its lexical scope even after the outer function has returned. It remembers the environment in which it was created. A is an IIFE. C is nonsense. D is irrelevant to closures."}, {"id": 13, "topic": "Core JS", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nfunction makeCounter() {\n  let count = 0;\n  return function() {\n    count++;\n    return count;\n  };\n}\nconst counter = makeCounter();\nconsole.log(counter());\nconsole.log(counter());\nconsole.log(counter());", "options": {"A": "0, 0, 0", "B": "1, 1, 1", "C": "1, 2, 3", "D": "undefined, undefined, undefined"}, "answer": "C", "explanation": "makeCounter returns an inner function that closes over count. Every call to counter() increments the SAME count variable because the closure keeps it alive in memory. This is the classic closure use case \u2014 private state management."}, {"id": 14, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfunction outer() {\n  let x = 10;\n  return {\n    get: () => x,\n    set: (val) => { x = val; }\n  };\n}\nconst obj = outer();\nobj.set(99);\nconsole.log(obj.get());", "options": {"A": "10", "B": "99", "C": "undefined", "D": "ReferenceError"}, "answer": "B", "explanation": "Both get and set close over the same x. set(99) mutates x in the shared closure. get() returns the updated x. This is the module pattern \u2014 simulating private variables via closures. Both functions share the same lexical environment."}, {"id": 15, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfunction createFunctions() {\n  var funcs = [];\n  for (var i = 0; i < 3; i++) {\n    funcs.push(function() { return i; });\n  }\n  return funcs;\n}\nvar fs = createFunctions();\nconsole.log(fs[0](), fs[1](), fs[2]());", "options": {"A": "0, 1, 2", "B": "3, 3, 3", "C": "undefined, undefined, undefined", "D": "0, 0, 0"}, "answer": "B", "explanation": "All three functions close over the SAME var i. By the time any function is called, the loop has finished and i = 3. Fix: use let, or wrap in an IIFE to capture i per iteration: (function(i){ funcs.push(function(){ return i; }) })(i)."}, {"id": 16, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nlet add = (function() {\n  let counter = 0;\n  return function() { counter += 1; return counter; };\n})();\nconsole.log(add());\nconsole.log(add());\nconsole.log(add());", "options": {"A": "0, 0, 0", "B": "1, 1, 1", "C": "1, 2, 3", "D": "NaN, NaN, NaN"}, "answer": "C", "explanation": "This is an IIFE (Immediately Invoked Function Expression) that initializes counter = 0 once and returns the inner function. Each call to add() increments the same counter. This is a closure-based singleton counter \u2014 a common interview pattern."}, {"id": 17, "topic": "Core JS", "difficulty": "Hard", "type": "Coding Logic", "question": "What does the following code output?\n\nfunction multiplier(x) {\n  return function(y) {\n    return x * y;\n  };\n}\nconst double = multiplier(2);\nconst triple = multiplier(3);\nconsole.log(double(5));\nconsole.log(triple(5));\nconsole.log(double(triple(2)));", "options": {"A": "10, 15, 12", "B": "10, 15, 10", "C": "5, 5, 5", "D": "10, 15, 30"}, "answer": "A", "explanation": "double closes over x=2. triple closes over x=3. double(5) = 2*5 = 10. triple(5) = 3*5 = 15. triple(2) = 3*2 = 6, then double(6) = 2*6 = 12. Answer is 10, 15, 12. This is function currying via closures."}, {"id": 18, "topic": "Core JS", "difficulty": "Easy", "type": "Conceptual", "question": "What is the call stack in JavaScript?", "options": {"A": "A data structure that tracks asynchronous callbacks", "B": "A LIFO structure that tracks execution contexts of function calls", "C": "A queue that stores pending events", "D": "A heap that stores object references"}, "answer": "B", "explanation": "The call stack is a Last-In-First-Out (LIFO) stack that tracks which function is currently executing. Each function call pushes an execution context onto the stack; when it returns, it's popped off. Stack overflow occurs when it exceeds its size limit (infinite recursion). Async tasks go to the task queue, NOT the call stack."}, {"id": 19, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfunction first() {\n  console.log('first');\n  second();\n  console.log('first done');\n}\nfunction second() {\n  console.log('second');\n}\nfirst();", "options": {"A": "first, first done, second", "B": "second, first, first done", "C": "first, second, first done", "D": "first done, second, first"}, "answer": "C", "explanation": "Execution is synchronous and sequential. first() logs 'first', calls second() which logs 'second', returns, then first() logs 'first done'. The call stack: global \u2192 first \u2192 second \u2192 (pop second) \u2192 first continues \u2192 (pop first)."}, {"id": 20, "topic": "Core JS", "difficulty": "Hard", "type": "Conceptual", "question": "What are the two phases of JavaScript execution context creation?", "options": {"A": "Parsing phase and Execution phase", "B": "Creation phase and Execution phase", "C": "Hoisting phase and Assignment phase", "D": "Compilation phase and Interpretation phase"}, "answer": "B", "explanation": "Every execution context goes through: (1) Creation phase \u2014 sets up scope chain, 'this', hoists var declarations (as undefined) and function declarations (fully). (2) Execution phase \u2014 code runs line by line, assignments happen. Understanding this is key to explaining hoisting correctly in interviews."}, {"id": 21, "topic": "Core JS", "difficulty": "Easy", "type": "Conceptual", "question": "In the global execution context (non-strict mode, browser), what does 'this' refer to?", "options": {"A": "undefined", "B": "null", "C": "window object", "D": "module.exports"}, "answer": "C", "explanation": "In a browser, the global this is the window object. In Node.js global scope, this refers to {} (empty module exports object) or global in the REPL. In strict mode inside a function, this is undefined. This is a common environment-specific trap."}, {"id": 22, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst obj = {\n  name: 'Zaheer',\n  greet: function() {\n    console.log(this.name);\n  }\n};\nconst greet = obj.greet;\ngreet();", "options": {"A": "Zaheer", "B": "undefined", "C": "null", "D": "TypeError"}, "answer": "B", "explanation": "When you extract a method from an object and call it standalone (greet()), it loses its object context. In non-strict mode, this defaults to global (window), which has no 'name' property, so this.name is undefined. In strict mode, this would be undefined and throw TypeError. Always use .bind(obj) to preserve context."}, {"id": 23, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst obj = {\n  name: 'Zaheer',\n  greet: () => {\n    console.log(this.name);\n  }\n};\nobj.greet();", "options": {"A": "Zaheer", "B": "undefined", "C": "TypeError", "D": "null"}, "answer": "B", "explanation": "Arrow functions do NOT have their own 'this'. They inherit 'this' from the surrounding lexical scope at the time they were DEFINED. The arrow function is defined in the global scope context (not inside a function), so 'this' is window/global, which has no 'name'. Never use arrow functions as object methods if you need 'this' to refer to the object."}, {"id": 24, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nfunction Person(name) {\n  this.name = name;\n  this.sayName = function() {\n    setTimeout(function() {\n      console.log(this.name);\n    }, 100);\n  };\n}\nconst p = new Person('Zaheer');\np.sayName();", "options": {"A": "Zaheer", "B": "undefined", "C": "TypeError", "D": "Person"}, "answer": "B", "explanation": "The regular function inside setTimeout has its own 'this' which defaults to global/window (non-strict). So this.name is undefined. Fix: use arrow function in setTimeout (() => console.log(this.name)) or capture 'this' with const self = this before the timeout."}, {"id": 25, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst obj = { x: 42 };\nfunction getX() { return this.x; }\nconsole.log(getX.call(obj));\nconsole.log(getX.apply(obj));\nconsole.log(getX.bind(obj)());", "options": {"A": "42, 42, 42", "B": "undefined, undefined, undefined", "C": "42, undefined, 42", "D": "TypeError for all three"}, "answer": "A", "explanation": "call(obj) invokes getX with this=obj immediately. apply(obj) does the same but accepts args as array. bind(obj) returns a NEW function permanently bound to obj \u2014 calling it with () executes it. All three produce 42. Key difference: bind does NOT invoke immediately."}, {"id": 26, "topic": "Core JS", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(1 + '2');", "options": {"A": "3", "B": "12", "C": "'12'", "D": "NaN"}, "answer": "B", "explanation": "When + is used with a string operand, JavaScript coerces the number to a string and concatenates. 1 + '2' \u2192 '1' + '2' \u2192 '12'. This is string concatenation, not addition. Use Number() or parseInt() if you need numeric addition."}, {"id": 27, "topic": "Core JS", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconsole.log('5' - 2);", "options": {"A": "'52'", "B": "3", "C": "NaN", "D": "52"}, "answer": "B", "explanation": "The - operator has no string concatenation meaning \u2014 it's purely numeric. So JS coerces '5' to number 5, then 5 - 2 = 3. Unlike + which can concatenate, -, *, / always trigger numeric coercion."}, {"id": 28, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(null + 1);\nconsole.log(undefined + 1);", "options": {"A": "1, 1", "B": "null1, undefined1", "C": "1, NaN", "D": "0, NaN"}, "answer": "C", "explanation": "null coerces to 0 in numeric contexts, so null + 1 = 0 + 1 = 1. undefined coerces to NaN in numeric contexts, so undefined + 1 = NaN + 1 = NaN. This asymmetry between null and undefined is a critical interview distinction."}, {"id": 29, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log([] + []);\nconsole.log([] + {});\nconsole.log({} + []);", "options": {"A": "[], [object Object], [object Object]", "B": "'', '[object Object]', '[object Object]'", "C": "'', '[object Object]', 0", "D": "'', '[object Object]', NaN"}, "answer": "B", "explanation": "[] + [] \u2192 '' + '' \u2192 '' (arrays coerce to empty string). [] + {} \u2192 '' + '[object Object]' \u2192 '[object Object]'. {} + [] \u2014 when {} is at the START of a statement, it's parsed as an empty block, so it becomes +[] \u2192 +'\u2192 0. But in console.log({} + []), it's an expression, so {} IS an object \u2192 '[object Object]' + '' \u2192 '[object Object]'. Context matters!"}, {"id": 30, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(false == '0');\nconsole.log(false === '0');\nconsole.log(null == undefined);\nconsole.log(null === undefined);", "options": {"A": "true, false, true, false", "B": "false, false, true, false", "C": "true, false, false, false", "D": "true, true, true, true"}, "answer": "A", "explanation": "false == '0': false\u21920, '0'\u21920, 0==0 \u2192 true. false === '0': different types \u2192 false. null == undefined: JS spec explicitly says these are equal with == but not === \u2192 true. null === undefined: different types \u2192 false. Know that null only loosely equals undefined and nothing else."}, {"id": 31, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(NaN === NaN);\nconsole.log(NaN == NaN);\nconsole.log(typeof NaN);\nconsole.log(isNaN('hello'));", "options": {"A": "false, false, 'NaN', true", "B": "false, false, 'number', true", "C": "true, true, 'number', false", "D": "false, true, 'NaN', false"}, "answer": "B", "explanation": "NaN is the ONLY value in JS not equal to itself \u2014 both == and === return false. typeof NaN is 'number' (historical quirk). isNaN('hello') coerces 'hello' to NaN first, then returns true. Use Number.isNaN() instead \u2014 it does NOT coerce: Number.isNaN('hello') \u2192 false."}, {"id": 32, "topic": "ES6+", "difficulty": "Easy", "type": "Conceptual", "question": "Which statement is TRUE about const?", "options": {"A": "const variables cannot be mutated in any way", "B": "const prevents reassignment of the variable binding, but object properties can still be modified", "C": "const is exactly the same as var but block-scoped", "D": "const variables are hoisted and initialized as undefined"}, "answer": "B", "explanation": "const prevents RE-ASSIGNMENT of the variable itself (you can't do const x = 1; x = 2;), but if the value is an object or array, its internal properties/elements CAN be modified (obj.name = 'new' is fine). Use Object.freeze() for deep immutability. const is block-scoped and is in TDZ \u2014 NOT initialized as undefined like var."}, {"id": 33, "topic": "ES6+", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst obj = { a: 1 };\nobj.a = 2;\nconsole.log(obj.a);\nobj = { a: 3 };\nconsole.log(obj.a);", "options": {"A": "2, 3", "B": "1, 3", "C": "2 then TypeError", "D": "1 then TypeError"}, "answer": "C", "explanation": "obj.a = 2 is allowed \u2014 you're mutating the object's property, not reassigning the binding. So obj.a logs 2. Then obj = { a: 3 } tries to REASSIGN the const binding \u2014 this throws TypeError: Assignment to constant variable. Execution stops there."}, {"id": 34, "topic": "ES6+", "difficulty": "Easy", "type": "Conceptual", "question": "Which of the following is a key difference between arrow functions and regular functions?", "options": {"A": "Arrow functions can be used as constructors", "B": "Arrow functions have their own 'arguments' object", "C": "Arrow functions do not bind their own 'this'", "D": "Arrow functions support the 'new' keyword"}, "answer": "C", "explanation": "Arrow functions lexically inherit 'this' from the surrounding scope \u2014 they have no own 'this'. Arrow functions also: have no 'arguments' object, cannot be used as constructors (no 'new'), have no 'prototype' property. These are critical differences for interview questions about 'this' behavior."}, {"id": 35, "topic": "ES6+", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst obj = {\n  value: 10,\n  getValue: function() {\n    const inner = () => this.value;\n    return inner();\n  }\n};\nconsole.log(obj.getValue());", "options": {"A": "undefined", "B": "10", "C": "TypeError", "D": "null"}, "answer": "B", "explanation": "getValue is a regular function, so 'this' inside it refers to obj when called as obj.getValue(). The arrow function inner() inherits 'this' from getValue's scope, which is obj. So inner() returns obj.value = 10. Arrow functions work correctly here because the enclosing function has the right 'this'."}, {"id": 36, "topic": "ES6+", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst [a, , b] = [1, 2, 3];\nconsole.log(a, b);", "options": {"A": "1, 2", "B": "1, 3", "C": "undefined, undefined", "D": "1, undefined"}, "answer": "B", "explanation": "Array destructuring with a hole (extra comma) skips elements. [a, , b] extracts index 0 as a=1, skips index 1, extracts index 2 as b=3. This is called 'elision' in destructuring. Commonly tested for awareness of skip syntax."}, {"id": 37, "topic": "ES6+", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst { a, b = 5 } = { a: 1 };\nconsole.log(a, b);", "options": {"A": "1, undefined", "B": "1, 5", "C": "undefined, 5", "D": "1, null"}, "answer": "B", "explanation": "Object destructuring with default values: a=1 is extracted from the object. b is not in the object, so the default value 5 is used. Default values only activate when the property is undefined \u2014 if b were null, the default would NOT kick in (null !== undefined)."}, {"id": 38, "topic": "ES6+", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst { a: { b } } = { a: { b: 42 } };\nconsole.log(b);\nconsole.log(a);", "options": {"A": "42, undefined", "B": "42, {b: 42}", "C": "42 then ReferenceError", "D": "undefined, undefined"}, "answer": "C", "explanation": "Nested destructuring: a: { b } extracts b from the nested object. b = 42. HOWEVER, 'a' is NOT declared as a variable \u2014 the pattern a: {} means 'match key a, then destructure its value'. So console.log(a) throws ReferenceError: a is not defined."}, {"id": 39, "topic": "ES6+", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, 3];\nconst arr2 = [...arr, 4, 5];\nconsole.log(arr2);", "options": {"A": "[1, 2, 3]", "B": "[[1,2,3], 4, 5]", "C": "[1, 2, 3, 4, 5]", "D": "[4, 5, 1, 2, 3]"}, "answer": "C", "explanation": "The spread operator (...arr) expands the array elements in place. So [...arr, 4, 5] creates a new array [1, 2, 3, 4, 5]. The original arr is unchanged. Spread creates a shallow copy."}, {"id": 40, "topic": "ES6+", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfunction sum(...nums) {\n  return nums.reduce((acc, n) => acc + n, 0);\n}\nconsole.log(sum(1, 2, 3, 4, 5));", "options": {"A": "[1,2,3,4,5]", "B": "15", "C": "NaN", "D": "TypeError"}, "answer": "B", "explanation": "Rest parameters (...nums) collect all arguments into an array. reduce accumulates 0+1+2+3+4+5 = 15. Rest parameters must always be the LAST parameter. This is different from the legacy 'arguments' object \u2014 rest gives you a real array."}, {"id": 41, "topic": "ES6+", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst name = 'World';\nconsole.log(`Hello ${name}!`);", "options": {"A": "Hello ${name}!", "B": "Hello World!", "C": "Hello undefined!", "D": "TypeError"}, "answer": "B", "explanation": "Template literals use backticks and ${} for expression interpolation. The variable name = 'World' is substituted. Template literals also support multi-line strings without \\n and tagged templates for advanced use cases."}, {"id": 42, "topic": "ES6+", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst a = 5, b = 10;\nconsole.log(`Sum: ${a + b}, Product: ${a * b}`);", "options": {"A": "Sum: a + b, Product: a * b", "B": "Sum: 15, Product: 50", "C": "Sum: 510, Product: 50", "D": "TypeError"}, "answer": "B", "explanation": "${} can contain any JavaScript expression, not just variables. a + b = 15, a * b = 50. Template literals evaluate expressions at runtime and convert results to strings."}, {"id": 43, "topic": "ES6+", "difficulty": "Easy", "type": "Conceptual", "question": "What is the difference between named exports and default exports in ES6 modules?", "options": {"A": "Named exports use 'module.exports', default exports use 'export'", "B": "Named exports must be imported using the exact same name (or aliased); a module can have only one default export", "C": "Default exports are always functions; named exports are always variables", "D": "There is no difference \u2014 they are interchangeable"}, "answer": "B", "explanation": "Named exports: export const x = 1 \u2014 import with { x } or { x as y }. Default exports: export default function \u2014 import with any name (import foo). A module can have multiple named exports but only ONE default export. Named and default can coexist in the same file."}, {"id": 44, "topic": "ES6+", "difficulty": "Medium", "type": "Conceptual", "question": "What is the output if you try to import a named export using default import syntax?\n\n// math.js\nexport const add = (a, b) => a + b;\n\n// app.js\nimport add from './math.js';\nconsole.log(add(1, 2));", "options": {"A": "3", "B": "TypeError: add is not a function", "C": "undefined", "D": "SyntaxError during import"}, "answer": "B", "explanation": "math.js has a NAMED export (export const add), not a default export. Importing with 'import add' uses default import syntax, which will be undefined (no default export exists). Calling undefined(1, 2) throws TypeError. Fix: import { add } from './math.js'."}, {"id": 45, "topic": "Async JS", "difficulty": "Easy", "type": "Conceptual", "question": "What are the three possible states of a JavaScript Promise?", "options": {"A": "Start, Running, Done", "B": "Pending, Resolved, Rejected", "C": "Pending, Fulfilled, Rejected", "D": "Open, Closed, Error"}, "answer": "C", "explanation": "A Promise has exactly three states: (1) Pending \u2014 initial state, neither fulfilled nor rejected. (2) Fulfilled \u2014 the operation completed successfully with a value. (3) Rejected \u2014 the operation failed with a reason. Note: 'resolved' is commonly used loosely but the spec term is 'fulfilled'. Once settled (fulfilled or rejected), a promise state cannot change."}, {"id": 46, "topic": "Async JS", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconsole.log('start');\nPromise.resolve(1).then(v => console.log(v));\nconsole.log('end');", "options": {"A": "start, 1, end", "B": "1, start, end", "C": "start, end, 1", "D": "start, end"}, "answer": "C", "explanation": "Promise callbacks (.then) are microtasks \u2014 they run AFTER the current synchronous code completes but BEFORE the next macrotask. So: 'start' logs, the promise is created (resolved immediately), 'end' logs, then the microtask queue drains and 1 logs. This tests event loop + microtask understanding."}, {"id": 47, "topic": "Async JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst p = new Promise((resolve, reject) => {\n  resolve('success');\n  reject('error');\n});\np.then(v => console.log(v))\n .catch(e => console.log(e));", "options": {"A": "success, error", "B": "error", "C": "success", "D": "TypeError"}, "answer": "C", "explanation": "A promise can only be settled ONCE. The first call (resolve('success')) locks the promise to fulfilled state. The subsequent reject('error') is completely ignored. The .then handler receives 'success'. The .catch handler never runs."}, {"id": 48, "topic": "Async JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nPromise.resolve('A')\n  .then(v => { console.log(v); return 'B'; })\n  .then(v => { console.log(v); })\n  .then(v => { console.log(v); });", "options": {"A": "A, B, B", "B": "A, B, undefined", "C": "A, undefined, undefined", "D": "A, B, null"}, "answer": "B", "explanation": "Promise chaining passes the return value of each .then to the next. First .then gets 'A', logs it, returns 'B'. Second .then gets 'B', logs it, returns undefined (no explicit return). Third .then gets undefined, logs it. Each .then creates a new promise."}, {"id": 49, "topic": "Async JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log('1');\nsetTimeout(() => console.log('2'), 0);\nPromise.resolve().then(() => console.log('3'));\nconsole.log('4');", "options": {"A": "1, 2, 3, 4", "B": "1, 4, 3, 2", "C": "1, 4, 2, 3", "D": "1, 3, 4, 2"}, "answer": "B", "explanation": "Execution order: Synchronous first (1, 4), then microtasks (Promise .then \u2192 3), then macrotasks (setTimeout \u2192 2). Microtasks always drain completely before any macrotask runs. This is the most tested event loop question in Indian frontend interviews."}, {"id": 50, "topic": "Async JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nasync function foo() {\n  console.log('A');\n  await Promise.resolve();\n  console.log('B');\n}\nconsole.log('C');\nfoo();\nconsole.log('D');", "options": {"A": "C, A, B, D", "B": "C, A, D, B", "C": "A, C, D, B", "D": "C, D, A, B"}, "answer": "B", "explanation": "'C' logs first (sync). foo() is called: 'A' logs (sync). await suspends foo() \u2014 everything after await is a microtask. Execution returns to caller. 'D' logs (sync). Microtask queue: 'B' logs. So: C \u2192 A \u2192 D \u2192 B. The await keyword is the key \u2014 it yields execution back to the caller."}, {"id": 51, "topic": "Async JS", "difficulty": "Easy", "type": "Conceptual", "question": "What does the async keyword do to a function's return value?", "options": {"A": "Wraps the return value in a setTimeout", "B": "Automatically wraps the return value in a Promise", "C": "Makes the function return undefined", "D": "Converts the return value to a string"}, "answer": "B", "explanation": "An async function ALWAYS returns a Promise. If you return a non-promise value, it's automatically wrapped: async function foo() { return 42; } is equivalent to function foo() { return Promise.resolve(42); }. If you return a Promise, it passes through. If an exception is thrown, it becomes a rejected Promise."}, {"id": 52, "topic": "Async JS", "difficulty": "Medium", "type": "Coding Logic", "question": "What does this code output?\n\nasync function getData() {\n  try {\n    const result = await Promise.reject('Error!');\n    console.log(result);\n  } catch(e) {\n    console.log('Caught:', e);\n  }\n}\ngetData();", "options": {"A": "Error!", "B": "undefined", "C": "Caught: Error!", "D": "Unhandled Promise Rejection"}, "answer": "C", "explanation": "await Promise.reject('Error!') causes the async function to throw, which is caught by the try/catch. The catch block logs 'Caught: Error!'. try/catch with async/await cleanly handles promise rejections \u2014 this is one of the main advantages over .catch() chaining."}, {"id": 53, "topic": "Async JS", "difficulty": "Hard", "type": "Coding Logic", "question": "Which is faster and why?\n\n// Version A\nasync function a() {\n  const x = await fetch('/api/1');\n  const y = await fetch('/api/2');\n  return [x, y];\n}\n\n// Version B\nasync function b() {\n  const [x, y] = await Promise.all([fetch('/api/1'), fetch('/api/2')]);\n  return [x, y];\n}", "options": {"A": "Version A \u2014 sequential is safer and thus faster", "B": "Version B \u2014 both fetches run concurrently, total time \u2248 max(t1, t2)", "C": "They are identical in performance", "D": "Version A \u2014 await is more optimized internally"}, "answer": "B", "explanation": "Version A awaits each fetch sequentially: total time = t1 + t2. Version B starts both fetches simultaneously with Promise.all \u2014 total time = max(t1, t2). For independent async operations, Promise.all is dramatically faster. Use sequential await only when each call depends on the previous result."}, {"id": 54, "topic": "Async JS", "difficulty": "Easy", "type": "Conceptual", "question": "JavaScript is single-threaded. How does it handle asynchronous operations?", "options": {"A": "By spawning new threads for each async task", "B": "Through the event loop, callback queue, and Web APIs", "C": "By blocking execution until the async task completes", "D": "Through SharedArrayBuffer and Atomics"}, "answer": "B", "explanation": "JavaScript has one call stack (single-threaded). Async operations (setTimeout, fetch, etc.) are handed off to Web APIs (browser) or libuv (Node.js). When complete, their callbacks are added to the task queue. The event loop moves callbacks to the call stack when it's empty. This is the non-blocking I/O model."}, {"id": 55, "topic": "Async JS", "difficulty": "Medium", "type": "Conceptual", "question": "What is the difference between microtasks and macrotasks?", "options": {"A": "Microtasks are smaller and run faster; macrotasks are larger", "B": "Microtasks (Promise callbacks, queueMicrotask) run before macrotasks (setTimeout, setInterval) and drain completely before the next macrotask", "C": "Macrotasks always have priority over microtasks", "D": "There is no functional difference \u2014 both are processed identically"}, "answer": "B", "explanation": "Microtask queue: Promise .then/.catch, queueMicrotask, MutationObserver. Macrotask queue: setTimeout, setInterval, setImmediate, I/O. After each macrotask, ALL microtasks drain completely before the next macrotask runs. This ordering is critical for predicting async execution order."}, {"id": 56, "topic": "Async JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nsetTimeout(() => console.log('timeout 1'), 0);\nPromise.resolve().then(() => {\n  console.log('promise 1');\n  setTimeout(() => console.log('timeout 2'), 0);\n}).then(() => console.log('promise 2'));\nconsole.log('sync');", "options": {"A": "sync, promise 1, promise 2, timeout 1, timeout 2", "B": "sync, timeout 1, promise 1, promise 2, timeout 2", "C": "sync, promise 1, timeout 1, promise 2, timeout 2", "D": "sync, promise 1, timeout 2, promise 2, timeout 1"}, "answer": "A", "explanation": "Order: 'sync' (synchronous). Microtasks drain: 'promise 1' (first .then), which queues 'timeout 2' as macrotask, then 'promise 2' (second .then). Now microtask queue is empty. Macrotask queue: 'timeout 1' (queued first) then 'timeout 2' (queued during microtask). Result: sync \u2192 promise 1 \u2192 promise 2 \u2192 timeout 1 \u2192 timeout 2."}, {"id": 57, "topic": "Arrays & Objects", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, 3, 4, 5];\nconst result = arr.filter(n => n % 2 === 0).map(n => n * 2);\nconsole.log(result);", "options": {"A": "[2, 4, 6, 8, 10]", "B": "[4, 8]", "C": "[2, 4]", "D": "[1, 3, 5]"}, "answer": "B", "explanation": "filter(n => n % 2 === 0) keeps even numbers: [2, 4]. map(n => n * 2) doubles each: [4, 8]. Method chaining on arrays is a common FP pattern. Note: filter and map both return NEW arrays \u2014 original arr is unchanged."}, {"id": 58, "topic": "Arrays & Objects", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, 3];\nconst sum = arr.reduce((acc, curr) => acc + curr, 0);\nconsole.log(sum);", "options": {"A": "[1, 2, 3]", "B": "6", "C": "0", "D": "NaN"}, "answer": "B", "explanation": "reduce starts with accumulator = 0 (second arg). Pass 1: 0+1=1. Pass 2: 1+2=3. Pass 3: 3+3=6. Returns 6. Always provide the initial value (second arg) \u2014 omitting it uses the first array element as the initial accumulator, which can cause bugs on empty arrays."}, {"id": 59, "topic": "Arrays & Objects", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, [2, [3, [4]]]];\nconsole.log(arr.flat());\nconsole.log(arr.flat(Infinity));", "options": {"A": "[1, 2, 3, 4], [1, 2, 3, 4]", "B": "[1, 2, [3, [4]]], [1, 2, 3, 4]", "C": "[1, [2, [3, [4]]]], [1, 2, 3, 4]", "D": "[1, 2, 3, 4], [1, 2, [3, [4]]]"}, "answer": "B", "explanation": "flat() with no argument flattens ONE level: [1, 2, [3, [4]]]. flat(Infinity) flattens all levels: [1, 2, 3, 4]. You can specify a depth: flat(2) would give [1, 2, 3, [4]]. flat() is ES2019."}, {"id": 60, "topic": "Arrays & Objects", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [3, 1, 4, 1, 5, 9];\nconsole.log(arr.sort());", "options": {"A": "[1, 1, 3, 4, 5, 9]", "B": "[3, 1, 4, 1, 5, 9]", "C": "[1, 1, 3, 4, 5, 9] \u2014 numerically sorted", "D": "[1, 1, 3, 4, 5, 9] \u2014 but wait, actually [1, 1, 3, 4, 5, 9]"}, "answer": "A", "explanation": "TRAP: arr.sort() without a comparator converts elements to STRINGS and sorts lexicographically. For numbers like [3,1,4,1,5,9] it happens to give numeric order here. But try [10, 9, 2] \u2014 it gives [10, 2, 9] not [2, 9, 10]. Always use arr.sort((a,b) => a - b) for numeric sorting. Also, sort() mutates the ORIGINAL array!"}, {"id": 61, "topic": "Arrays & Objects", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [10, 9, 2, 1, 100];\nconsole.log(arr.sort());\nconsole.log(arr.sort((a, b) => a - b));", "options": {"A": "[1, 10, 100, 2, 9], [1, 2, 9, 10, 100]", "B": "[1, 2, 9, 10, 100], [1, 2, 9, 10, 100]", "C": "[10, 9, 2, 1, 100], [1, 2, 9, 10, 100]", "D": "[1, 10, 100, 2, 9] for both"}, "answer": "A", "explanation": "sort() without comparator: converts to strings \u2192 lexicographic order \u2192 [1, 10, 100, 2, 9] (because '1' < '10' < '100' < '2' < '9'). sort((a,b) => a-b): numeric ascending \u2192 [1, 2, 9, 10, 100]. Since sort mutates arr in place, the second sort operates on the already-sorted result."}, {"id": 62, "topic": "Arrays & Objects", "difficulty": "Hard", "type": "Coding Logic", "question": "What does the following return?\n\n[1, 2, 3].map(parseInt)", "options": {"A": "[1, 2, 3]", "B": "[1, NaN, NaN]", "C": "[1, 2, NaN]", "D": "[NaN, NaN, NaN]"}, "answer": "B", "explanation": "map passes (element, index, array) to the callback. parseInt receives 2 args: (value, radix). So: parseInt(1, 0) \u2192 1 (radix 0 = base 10). parseInt(2, 1) \u2192 NaN (radix 1 is invalid). parseInt(3, 2) \u2192 NaN (3 is not a valid base-2 digit). This is a legendary JS gotcha. Fix: [1,2,3].map(n => parseInt(n))."}, {"id": 63, "topic": "Arrays & Objects", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst a = {};\nconst b = {};\nconsole.log(a === b);\nconsole.log(a == b);", "options": {"A": "true, true", "B": "false, false", "C": "true, false", "D": "false, true"}, "answer": "B", "explanation": "Objects are compared by REFERENCE, not value. a and b are two separate objects occupying different memory addresses. Even though they have identical content, a === b is false because they are different references. Same for ==. Two objects are only equal if they point to the SAME memory location."}, {"id": 64, "topic": "Arrays & Objects", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst obj = { a: 1, b: 2, c: 3 };\nconst { a, ...rest } = obj;\nconsole.log(a);\nconsole.log(rest);", "options": {"A": "1, { b: 2, c: 3 }", "B": "1, { a: 1, b: 2, c: 3 }", "C": "undefined, { b: 2, c: 3 }", "D": "1, undefined"}, "answer": "A", "explanation": "Object rest in destructuring collects all remaining properties not already extracted. a = 1, rest = { b: 2, c: 3 }. The rest syntax must ALWAYS be last in the destructuring pattern. This is ES2018 Object Rest/Spread."}, {"id": 65, "topic": "Arrays & Objects", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst obj1 = { a: 1 };\nconst obj2 = Object.assign({}, obj1);\nobj2.a = 99;\nconsole.log(obj1.a);", "options": {"A": "99", "B": "1", "C": "undefined", "D": "TypeError"}, "answer": "B", "explanation": "Object.assign({}, obj1) creates a SHALLOW copy. For primitive values (like a: 1), modifying obj2.a only changes obj2's property. obj1.a remains 1. HOWEVER, if the value were a nested object (a: { x: 1 }), modifying obj2.a.x WOULD affect obj1.a.x since they'd share the same reference."}, {"id": 66, "topic": "Arrays & Objects", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst obj = { a: 1, b: { c: 2 } };\nconst copy = { ...obj };\ncopy.a = 99;\ncopy.b.c = 99;\nconsole.log(obj.a, obj.b.c);", "options": {"A": "99, 99", "B": "1, 1", "C": "1, 99", "D": "99, 2"}, "answer": "C", "explanation": "Spread creates a SHALLOW copy. copy.a = 99 only affects copy (primitive value, new binding). But copy.b is the SAME REFERENCE as obj.b \u2014 they share the nested object. copy.b.c = 99 mutates the shared object, so obj.b.c becomes 99 too. Deep cloning requires structuredClone() or JSON.parse(JSON.stringify()) (with caveats)."}, {"id": 67, "topic": "OOP & Prototypes", "difficulty": "Easy", "type": "Conceptual", "question": "What is the prototype chain in JavaScript?", "options": {"A": "A linked list of all class definitions in a program", "B": "A mechanism where objects inherit properties and methods from other objects through the __proto__ link", "C": "A chain of try/catch blocks for error handling", "D": "A sequence of constructor function calls"}, "answer": "B", "explanation": "Every JS object has an internal [[Prototype]] (accessible via __proto__ or Object.getPrototypeOf()). When you access a property, JS looks on the object first, then walks up the prototype chain until it finds it or reaches null. This is prototypal inheritance \u2014 different from classical inheritance."}, {"id": 68, "topic": "OOP & Prototypes", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfunction Animal(name) {\n  this.name = name;\n}\nAnimal.prototype.speak = function() {\n  return this.name + ' speaks';\n};\nconst dog = new Animal('Rex');\nconsole.log(dog.speak());\nconsole.log(dog.hasOwnProperty('speak'));", "options": {"A": "Rex speaks, true", "B": "Rex speaks, false", "C": "undefined, false", "D": "TypeError, false"}, "answer": "B", "explanation": "speak() is on Animal.prototype, not on dog directly. dog.speak() works via prototype chain lookup. hasOwnProperty('speak') returns false because speak is inherited, not own. dog.hasOwnProperty('name') would return true. hasOwnProperty is the standard way to check own vs inherited properties."}, {"id": 69, "topic": "OOP & Prototypes", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nclass Dog extends Animal {\n  constructor(name) {\n    super(name);\n  }\n  speak() {\n    return super.speak() + ' (woof)';\n  }\n}\nconst d = new Dog('Rex');\nconsole.log(d.speak());", "options": {"A": "Rex speaks (woof)", "B": "undefined (woof)", "C": "Rex speaks", "D": "TypeError: super is not defined"}, "answer": "A", "explanation": "super() in constructor calls the parent constructor (Animal), setting this.name = 'Rex'. super.speak() calls Animal's speak() method on the current instance, returning 'Rex speaks'. The Dog's speak() appends ' (woof)'. ES6 classes are syntax sugar over prototype-based inheritance."}, {"id": 70, "topic": "OOP & Prototypes", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nfunction Foo() {}\nFoo.prototype.x = 1;\nconst obj = new Foo();\nFoo.prototype.x = 2;\nconsole.log(obj.x);", "options": {"A": "1", "B": "2", "C": "undefined", "D": "TypeError"}, "answer": "B", "explanation": "obj.x is looked up via prototype chain \u2014 it reads from Foo.prototype LIVE at access time. After Foo.prototype.x = 2, any object that inherits from Foo.prototype will see x = 2. Prototype properties are shared references, not copies made at construction time. This is a live link."}, {"id": 71, "topic": "OOP & Prototypes", "difficulty": "Hard", "type": "Conceptual", "question": "What does Object.create(null) produce?", "options": {"A": "A null value", "B": "An object with Object.prototype as its prototype", "C": "An object with NO prototype (prototype chain is null)", "D": "An empty array"}, "answer": "C", "explanation": "Object.create(null) creates a truly empty object with NO prototype at all \u2014 not even Object.prototype. This means it has none of the standard methods like hasOwnProperty, toString, valueOf. Used for pure dictionary/map objects to avoid prototype pollution. Contrast with {} which has Object.prototype."}, {"id": 72, "topic": "Functional Programming", "difficulty": "Easy", "type": "Conceptual", "question": "What is a pure function?", "options": {"A": "A function that uses only primitive types", "B": "A function that always returns the same output for the same input and has no side effects", "C": "A function with no parameters", "D": "A function defined with the pure keyword"}, "answer": "B", "explanation": "A pure function: (1) Is deterministic \u2014 same input always yields same output. (2) Has no side effects \u2014 doesn't modify external state (no global variable mutations, no console.log, no API calls, no DOM changes). Pure functions are the foundation of functional programming and are trivially testable."}, {"id": 73, "topic": "Functional Programming", "difficulty": "Medium", "type": "Coding Logic", "question": "Which of the following is a pure function?", "options": {"A": "function add(a, b) { console.log(a+b); return a+b; }", "B": "let total = 0; function addToTotal(n) { total += n; return total; }", "C": "function add(a, b) { return a + b; }", "D": "function rand(n) { return Math.random() * n; }"}, "answer": "C", "explanation": "C is pure: same inputs always produce same output, no side effects. A has a side effect (console.log). B reads and modifies external state (total). D is non-deterministic (Math.random). In React, components should ideally be pure \u2014 same props = same render output."}, {"id": 74, "topic": "Functional Programming", "difficulty": "Medium", "type": "Conceptual", "question": "What is function composition?", "options": {"A": "Writing multiple functions in the same file", "B": "Combining two or more functions where output of one becomes input of the next", "C": "A function that calls itself recursively", "D": "A function that returns another function"}, "answer": "B", "explanation": "Function composition: compose(f, g)(x) = f(g(x)). The output of g becomes the input of f. In JS: const compose = (f, g) => x => f(g(x)). Pipe is the reverse: pipe(f, g)(x) = g(f(x)). Libraries like Ramda and Lodash/fp have built-in compose/pipe. This is core to functional programming style."}, {"id": 75, "topic": "Functional Programming", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output of this curried function?\n\nconst curry = fn => a => b => fn(a, b);\nconst add = (a, b) => a + b;\nconst curriedAdd = curry(add);\nconsole.log(curriedAdd(5)(3));", "options": {"A": "TypeError", "B": "53", "C": "8", "D": "undefined"}, "answer": "C", "explanation": "curry(add) returns a => b => add(a, b). curriedAdd(5) returns b => add(5, b). curriedAdd(5)(3) calls add(5, 3) = 8. Currying converts a multi-argument function into a chain of single-argument functions. Enables partial application: const add5 = curriedAdd(5); allows reuse with different second args."}, {"id": 76, "topic": "DOM & Browser APIs", "difficulty": "Easy", "type": "Conceptual", "question": "What is event bubbling?", "options": {"A": "An event that triggers on the window object first, then propagates down to the target", "B": "An event that starts at the target element and propagates up through ancestor elements", "C": "Events that run in parallel simultaneously", "D": "Events fired repeatedly at regular intervals"}, "answer": "B", "explanation": "Event bubbling: event fires on target, then bubbles UP through parent \u2192 grandparent \u2192 ... \u2192 document \u2192 window. Capture phase is the opposite (top-down). Use event.stopPropagation() to prevent bubbling. Event delegation exploits bubbling \u2014 attach one listener on a parent instead of many on children."}, {"id": 77, "topic": "DOM & Browser APIs", "difficulty": "Medium", "type": "Conceptual", "question": "What is event delegation and why is it useful?", "options": {"A": "Assigning events to each DOM element individually for better control", "B": "Attaching a single event listener to a parent element to handle events from child elements via bubbling", "C": "Delegating event handling to a Web Worker", "D": "Using requestAnimationFrame to delay event processing"}, "answer": "B", "explanation": "Event delegation: instead of 1000 click listeners on 1000 list items, attach ONE listener to the <ul>. When an <li> is clicked, the event bubbles up to <ul>. Use event.target to identify which child was clicked. Benefits: better performance, works for dynamically added elements, less memory usage."}, {"id": 78, "topic": "DOM & Browser APIs", "difficulty": "Medium", "type": "Coding Logic", "question": "What is the difference between event.target and event.currentTarget?", "options": {"A": "They are always the same element", "B": "event.target is the element that triggered the event; event.currentTarget is the element the listener is attached to", "C": "event.currentTarget is the element clicked; event.target is the parent", "D": "event.target is only available in capture phase"}, "answer": "B", "explanation": "If you click a child element inside a div that has the listener: event.target = the actual clicked element (child). event.currentTarget = the element the listener is on (div). During bubbling, event.currentTarget changes at each handler, but event.target always remains the original trigger."}, {"id": 79, "topic": "DOM & Browser APIs", "difficulty": "Hard", "type": "Conceptual", "question": "What is the difference between localStorage, sessionStorage, and cookies?", "options": {"A": "They are all identical in functionality", "B": "localStorage persists indefinitely; sessionStorage clears on tab close; cookies can be sent with HTTP requests and have expiry", "C": "sessionStorage persists indefinitely; localStorage clears on tab close", "D": "Cookies are only accessible via JavaScript, not sent with HTTP requests"}, "answer": "B", "explanation": "localStorage: persists across sessions, ~5MB, same origin only. sessionStorage: cleared when tab/session closes, ~5MB, not shared between tabs. Cookies: sent automatically with every HTTP request (security risk!), smaller (~4KB), can set expiry, can be HttpOnly (JS can't access) and Secure. Use localStorage for client state, cookies for auth tokens."}, {"id": 80, "topic": "DOM & Browser APIs", "difficulty": "Hard", "type": "Conceptual", "question": "What does debouncing do and when should you use it?", "options": {"A": "Executes a function immediately and ignores subsequent calls", "B": "Delays function execution until after a specified wait time has elapsed since the last call", "C": "Executes a function at a fixed interval regardless of how often it's called", "D": "Cancels all pending event listeners"}, "answer": "B", "explanation": "Debounce: waits until the user STOPS triggering the event for N ms before executing. Use case: search-as-you-type \u2014 wait until user stops typing before firing API call. Throttle (different!) limits to once per N ms regardless. Debounce: last call wins. Throttle: first call wins per interval."}, {"id": 81, "topic": "Core JS", "difficulty": "Easy", "type": "Conceptual", "question": "What happens if a Promise rejects and there is no .catch() or rejection handler?", "options": {"A": "Nothing \u2014 it is silently ignored", "B": "JavaScript throws a synchronous error", "C": "An UnhandledPromiseRejectionWarning is triggered (Node.js crashes in some versions)", "D": "The browser automatically retries the promise"}, "answer": "C", "explanation": "Unhandled promise rejections in Node.js (v15+) cause the process to EXIT with a non-zero code. In browsers, they trigger the unhandledrejection event. Always handle rejections with .catch() or try/catch in async/await. window.addEventListener('unhandledrejection', handler) can catch them globally."}, {"id": 82, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\ntry {\n  throw new Error('oops');\n} catch(e) {\n  console.log(e.message);\n} finally {\n  console.log('finally');\n}", "options": {"A": "oops", "B": "oops, finally", "C": "finally, oops", "D": "Error: oops, finally"}, "answer": "B", "explanation": "The catch block runs when an error is thrown, logging e.message = 'oops'. The finally block ALWAYS runs, regardless of whether an error occurred or not. Output: 'oops' then 'finally'. finally runs even after a return statement in try/catch."}, {"id": 83, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nfunction test() {\n  try {\n    return 1;\n  } finally {\n    return 2;\n  }\n}\nconsole.log(test());", "options": {"A": "1", "B": "2", "C": "undefined", "D": "TypeError"}, "answer": "B", "explanation": "This is a critical trap: the finally block OVERRIDES the return from try. Even though try returns 1, finally runs before the function actually returns and its return 2 takes precedence. Avoid return in finally blocks \u2014 it swallows the try return value and can hide errors."}, {"id": 84, "topic": "ES6+", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfunction* gen() {\n  yield 1;\n  yield 2;\n  yield 3;\n}\nconst g = gen();\nconsole.log(g.next().value);\nconsole.log(g.next().value);\nconsole.log(g.next().value);\nconsole.log(g.next().value);", "options": {"A": "1, 2, 3, undefined", "B": "1, 2, 3, 4", "C": "1, 1, 1, 1", "D": "1, 2, 3, null"}, "answer": "A", "explanation": "Generator functions pause at each yield. First next() runs to yield 1 \u2192 {value: 1, done: false}. Second \u2192 yield 2. Third \u2192 yield 3. Fourth next() runs to end of function \u2192 {value: undefined, done: true}. Generators produce lazy sequences and are used in async patterns (like Redux-Saga)."}, {"id": 85, "topic": "ES6+", "difficulty": "Hard", "type": "Conceptual", "question": "What is Symbol.iterator and what does it enable?", "options": {"A": "A method to count the number of items in an object", "B": "A well-known Symbol that makes an object iterable, enabling for...of loops and spread on custom objects", "C": "A way to create private class properties", "D": "A method to convert objects to arrays"}, "answer": "B", "explanation": "Implementing [Symbol.iterator]() on an object makes it iterable. The method must return an iterator object with a next() method that returns {value, done}. Arrays, Strings, Maps, Sets have it built-in. Custom iterables can be used with for...of, spread, destructuring, Promise.all, etc."}, {"id": 86, "topic": "ES6+", "difficulty": "Easy", "type": "Conceptual", "question": "What is the main difference between a Map and a plain Object?", "options": {"A": "Map can only store string keys; Object can store any type", "B": "Map maintains insertion order, allows any key type (including objects/functions), and has a .size property", "C": "There is no meaningful difference", "D": "Objects are faster in all use cases"}, "answer": "B", "explanation": "Map advantages: any value as key (objects, functions, symbols), guaranteed insertion order, .size property, no prototype pollution, better performance for frequent add/delete. Object: string/symbol keys only, faster for simple lookup when key names are known at compile time. Use Map when keys are dynamic or non-strings."}, {"id": 87, "topic": "ES6+", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst set = new Set([1, 2, 3, 2, 1]);\nconsole.log(set.size);\nconsole.log([...set]);", "options": {"A": "5, [1, 2, 3, 2, 1]", "B": "3, [1, 2, 3]", "C": "2, [1, 2]", "D": "3, [3, 2, 1]"}, "answer": "B", "explanation": "Set stores UNIQUE values. Duplicates (2 and 1 appearing twice) are ignored. set.size = 3. Spreading a Set into an array: [1, 2, 3] (insertion order preserved). Classic use case: [...new Set(arr)] to remove duplicates from an array."}, {"id": 88, "topic": "ES6+", "difficulty": "Hard", "type": "Conceptual", "question": "What is the main purpose of WeakMap?", "options": {"A": "A Map with fewer features for better performance", "B": "A Map that holds weak references to keys \u2014 keys are garbage collected when no other references exist, preventing memory leaks", "C": "A Map that only stores primitive values", "D": "A Map that limits the number of entries"}, "answer": "B", "explanation": "WeakMap: keys must be objects, references are 'weak' (don't prevent GC). If the key object is GC'd, the entry is automatically removed. Not enumerable, no .size. Use for: caching DOM element data without memory leaks, private class data. Regular Map holds strong references \u2014 can cause memory leaks if keys accumulate."}, {"id": 89, "topic": "ES6+", "difficulty": "Hard", "type": "Conceptual", "question": "What is the JavaScript Proxy object used for?", "options": {"A": "Making HTTP proxy requests", "B": "Intercepting and customizing fundamental object operations like property access, assignment, function invocation", "C": "Creating copies of objects", "D": "Preventing object mutation"}, "answer": "B", "explanation": "Proxy wraps an object and intercepts operations via handler traps: get (property access), set (assignment), has (in operator), deleteProperty, apply (function calls), etc. Use cases: validation, logging, reactive data (Vue 3 uses Proxy for reactivity), default property values. Reflect provides methods matching each trap."}, {"id": 90, "topic": "DOM & Browser APIs", "difficulty": "Medium", "type": "Coding Logic", "question": "What does the following output?\n\nconst str = 'hello world';\nconsole.log(str.match(/\\w+/g));", "options": {"A": "['hello world']", "B": "['hello', 'world']", "C": "null", "D": "['h', 'e', 'l', 'l', 'o', 'w', 'o', 'r', 'l', 'd']"}, "answer": "B", "explanation": "\\w+ matches one or more word characters (letters, digits, underscore). The g flag finds ALL matches. Space is not a word character, so it splits at the space. Result: ['hello', 'world']. Without g flag, match() returns only the first match with capture group info."}, {"id": 91, "topic": "Arrays & Objects", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst str = 'Hello World';\nconsole.log(str.includes('World'));\nconsole.log(str.startsWith('hello'));", "options": {"A": "true, true", "B": "true, false", "C": "false, false", "D": "false, true"}, "answer": "B", "explanation": "includes() is case-sensitive: 'World' matches \u2192 true. startsWith() is also case-sensitive: 'hello' vs 'Hello' \u2192 false. Use toLowerCase() for case-insensitive comparisons. Both methods are ES6 and return booleans."}, {"id": 92, "topic": "Arrays & Objects", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log('abc'.repeat(3));\nconsole.log('  hello  '.trim());\nconsole.log('abc'.padStart(5, '0'));", "options": {"A": "abcabcabc, 'hello', '00abc'", "B": "abcabcabc, hello, 00abc", "C": "abc3, hello, abc00", "D": "abcabc, '  hello  ', '0abc'"}, "answer": "B", "explanation": "repeat(3) \u2192 'abcabcabc'. trim() removes leading/trailing whitespace \u2192 'hello'. padStart(5, '0') pads to total length 5 with '0' \u2192 '00abc' (since 'abc' is 3 chars, needs 2 zeros). padEnd pads the other side."}, {"id": 93, "topic": "Arrays & Objects", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(0.1 + 0.2 === 0.3);\nconsole.log(Math.round((0.1 + 0.2) * 10) / 10 === 0.3);", "options": {"A": "true, true", "B": "false, true", "C": "true, false", "D": "false, false"}, "answer": "B", "explanation": "Floating point precision: 0.1 + 0.2 = 0.30000000000000004 in IEEE 754. So direct === comparison fails. Rounding to 1 decimal: Math.round(3.0000000000000004) / 10 = 3/10 = 0.3 \u2192 true. Always use epsilon comparison or rounding for float arithmetic: Math.abs(a-b) < Number.EPSILON."}, {"id": 94, "topic": "OOP & Prototypes", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(typeof null);\nconsole.log(typeof undefined);\nconsole.log(typeof function(){});\nconsole.log(typeof []);", "options": {"A": "null, undefined, function, array", "B": "object, undefined, function, object", "C": "null, undefined, object, array", "D": "object, undefined, object, object"}, "answer": "B", "explanation": "typeof null \u2192 'object' (famous JS bug, unfixable for backward compatibility). typeof undefined \u2192 'undefined'. typeof function(){} \u2192 'function' (functions are special objects). typeof [] \u2192 'object' (arrays are objects). Use Array.isArray() to check for arrays. Use obj === null for null check."}, {"id": 95, "topic": "OOP & Prototypes", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, 3];\nconsole.log(arr instanceof Array);\nconsole.log(arr instanceof Object);\nconsole.log(Array.isArray(arr));", "options": {"A": "true, false, true", "B": "true, true, true", "C": "false, true, true", "D": "true, true, false"}, "answer": "B", "explanation": "arr instanceof Array \u2192 true (arr's prototype chain includes Array.prototype). arr instanceof Object \u2192 true (Array.prototype's prototype is Object.prototype \u2014 everything is an object). Array.isArray(arr) \u2192 true. Note: instanceof can fail across iframes (different global contexts) \u2014 Array.isArray is more reliable."}, {"id": 96, "topic": "Arrays & Objects", "difficulty": "Medium", "type": "Coding Logic", "question": "Which method correctly creates a deep clone of an object (with caveats)?", "options": {"A": "Object.assign({}, obj)", "B": "{ ...obj }", "C": "JSON.parse(JSON.stringify(obj))", "D": "Object.create(obj)"}, "answer": "C", "explanation": "JSON.parse(JSON.stringify(obj)) is a common deep clone hack. Caveats: loses undefined values, functions, Symbols, Date objects become strings, circular references throw errors. A and B are shallow copies. D creates a new object with obj as prototype (not a copy). structuredClone(obj) is the modern proper deep clone (ES2022)."}, {"id": 97, "topic": "OOP & Prototypes", "difficulty": "Hard", "type": "Conceptual", "question": "What is prototype pollution?", "options": {"A": "Adding too many methods to a class", "B": "A security vulnerability where an attacker modifies Object.prototype, affecting all objects in the application", "C": "A memory leak caused by circular references in prototype chains", "D": "Using __proto__ in production code"}, "answer": "B", "explanation": "Prototype pollution: if user input like JSON with __proto__ key is merged naively (Object.assign or lodash.merge without protection), it can modify Object.prototype. Since all objects inherit from Object.prototype, the pollution affects every object. Example: obj['__proto__']['isAdmin'] = true \u2192 all {} objects now have isAdmin. Dangerous in Node.js apps."}, {"id": 98, "topic": "DOM & Browser APIs", "difficulty": "Hard", "type": "Conceptual", "question": "What is the difference between == and === in terms of performance?", "options": {"A": "=== is significantly slower due to strict type checking", "B": "== is slower because it involves type coercion algorithms before comparison", "C": "They are identical in performance", "D": "== is faster for objects, === is faster for primitives"}, "answer": "B", "explanation": "== (loose equality) must run the Abstract Equality Comparison algorithm \u2014 which may involve type conversions, calling valueOf()/toString(), and multiple comparison steps. === (strict equality) checks type first; if types differ, immediately returns false \u2014 no coercion. Always prefer === for predictability and slight performance benefit."}, {"id": 99, "topic": "Core JS", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst obj = {};\nobj[true] = 'boolean';\nobj[1] = 'number';\nobj['1'] = 'string';\nconsole.log(Object.keys(obj).length);", "options": {"A": "3", "B": "2", "C": "1", "D": "4"}, "answer": "B", "explanation": "Object keys are always strings (or Symbols). true \u2192 '\"true\"', 1 \u2192 '1', '1' \u2192 '1'. So obj['1'] = 'string' overwrites obj[1] = 'number' (same key). We end up with keys 'true' and '1'. Object.keys.length = 2. This is a type coercion trap for property keys."}, {"id": 100, "topic": "Core JS", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(typeof class {});\nconsole.log(typeof (() => {}));\nconsole.log(class {} instanceof Function);", "options": {"A": "class, arrow, true", "B": "function, function, true", "C": "object, function, false", "D": "function, object, true"}, "answer": "B", "explanation": "ES6 classes are syntactic sugar over constructor functions. typeof class {} \u2192 'function'. Arrow functions: typeof (() => {}) \u2192 'function'. class {} instanceof Function \u2192 true because classes ARE functions under the hood. This is why class Foo can be called with new \u2014 it's a special kind of function."}, {"id": 101, "topic": "Coding Logic", "subtopic": "Tree traversal", "difficulty": "Hard", "type": "Conceptual", "question": "What is the difference between DFS and BFS for tree traversal?", "options": {"A": "DFS uses a queue, BFS uses a stack", "B": "DFS uses a stack (or recursion) and goes deep first; BFS uses a queue and visits level by level", "C": "They are identical for binary trees", "D": "BFS only works on graphs, not trees"}, "answer": "B", "explanation": "DFS (Depth-First Search): goes as deep as possible before backtracking. Uses a stack (implicit via recursion or explicit). BFS (Breadth-First Search): visits all nodes at current depth before go
