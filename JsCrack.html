 "options": {"A": "A way to zoom into images in JS", "B": "A composable getter/setter pair for focusing on a specific part of a nested data structure immutably", "C": "A performance profiling tool", "D": "A CSS-in-JS technique"}, "answer": "B", "explanation": "A Lens is a pair of `get` (view) and `set` (update) functions for a specific nested path in an object. Lenses compose to drill into nested structures. Example: `set(nameLens, 'Ali', person)` returns a new person with name changed, without mutation. Used in Ramda, FP-TS."}, {"id": 220, "topic": "Core JS", "subtopic": "Regex", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst str = 'hello world hello';\nconsole.log(str.replace('hello', 'hi'));\nconsole.log(str.replace(/hello/g, 'hi'));", "options": {"A": "hi world hi, hi world hi", "B": "hi world hello, hi world hi", "C": "hello world hi, hi world hi", "D": "hi world hello, hello world hi"}, "answer": "B", "explanation": "`replace` with a STRING only replaces the FIRST occurrence. With regex `g` flag, replaces ALL occurrences. So first: 'hi world hello'. Second: 'hi world hi'."}, {"id": 221, "topic": "Async JS", "subtopic": "Saga pattern", "difficulty": "Hard", "type": "Conceptual", "question": "What is the Saga pattern for managing long-running transactions?", "options": {"A": "Using a series of try/catch blocks", "B": "A sequence of async operations where each has a compensating action to undo it on failure", "C": "Running all operations in parallel", "D": "A database transaction pattern"}, "answer": "B", "explanation": "Saga pattern: a long transaction is split into steps. Each step has a compensating action (rollback). If step N fails, compensating actions for steps N-1 through 1 are run to undo completed work. Maintains consistency without distributed transactions. Used in Redux-Saga and microservices."}, {"id": 222, "topic": "Edge Cases", "subtopic": "Function constructor", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst add = new Function('a', 'b', 'return a + b');\nconsole.log(add(3, 4));\nconsole.log(add.name);", "options": {"A": "7, 'add'", "B": "7, 'anonymous'", "C": "TypeError", "D": "7, ''"}, "answer": "B", "explanation": "`new Function()` creates functions dynamically from strings. It's like `eval` but creates a function. The function runs in global scope (not the enclosing closure). `add.name` is 'anonymous' for dynamically created functions. Security risk \u2014 avoid in production."}, {"id": 223, "topic": "Core JS", "subtopic": "instanceof chain", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log([] instanceof Array);\nconsole.log([] instanceof Object);\nconsole.log(function(){} instanceof Function);\nconsole.log(function(){} instanceof Object);", "options": {"A": "true, false, true, false", "B": "true, true, true, true", "C": "true, true, true, false", "D": "false, false, true, true"}, "answer": "B", "explanation": "All instances ultimately inherit from Object. `[] instanceof Array` \u2192 true. `[] instanceof Object` \u2192 true (Array inherits from Object). `function(){} instanceof Function` \u2192 true. `function(){} instanceof Object` \u2192 true (Function inherits from Object)."}, {"id": 224, "topic": "Coding Logic", "subtopic": "Top K elements", "difficulty": "Hard", "type": "Conceptual", "question": "What is the most efficient way to find the top K largest elements from an array?", "options": {"A": "Sort descending, slice first K \u2014 O(n log n)", "B": "Min-heap of size K \u2014 O(n log k)", "C": "QuickSelect algorithm \u2014 O(n) average", "D": "All of the above are valid, with different trade-offs"}, "answer": "D", "explanation": "All three work: (A) Sort + slice: simple, O(n log n). (B) Min-heap of size K: iterate once, keep heap of K largest \u2014 O(n log k), better when k << n. (C) QuickSelect: finds kth largest in O(n) average without full sort. Choice depends on constraints."}, {"id": 225, "topic": "DOM & Browser APIs", "subtopic": "Resize Observer", "difficulty": "Hard", "type": "Conceptual", "question": "What is ResizeObserver used for?", "options": {"A": "Watching for window resize events", "B": "Observing size changes of individual elements without window resize events", "C": "Resizing images automatically", "D": "Viewport meta tag management"}, "answer": "B", "explanation": "ResizeObserver fires when an element's dimensions change \u2014 independent of window resize. Useful for: responsive charts that resize when their container changes, textarea auto-grow, virtual scrollers updating visible window. More precise than `window.resize` for element-level changes."}, {"id": 226, "topic": "Core JS", "subtopic": "Object literal tricks", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst obj = {\n  0: 'zero',\n  1: 'one',\n  length: 2\n};\nconsole.log(Array.from(obj));", "options": {"A": "TypeError", "B": "['zero', 'one']", "C": "[0, 1]", "D": "[{0:'zero'},{1:'one'}]"}, "answer": "B", "explanation": "`Array.from` converts array-like objects (with numeric keys and `length`) to real arrays. `obj` has `0`, `1`, and `length: 2` \u2014 it's array-like. `Array.from(obj)` produces `['zero', 'one']`."}, {"id": 227, "topic": "ES6+", "subtopic": "Generator infinite sequence", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output?\n\nfunction* naturals(start = 1) {\n  while (true) yield start++;\n}\nconst gen = naturals();\nconst first5 = Array.from({ length: 5 }, () => gen.next().value);\nconsole.log(first5);", "options": {"A": "[1,2,3,4,5]", "B": "[0,1,2,3,4]", "C": "Infinite loop", "D": "TypeError"}, "answer": "A", "explanation": "`naturals()` yields 1, 2, 3, ... infinitely (generator is lazy \u2014 only runs when `.next()` is called). `Array.from({ length: 5 }, () => gen.next().value)` calls `.next()` exactly 5 times, collecting `[1,2,3,4,5]`."}, {"id": 228, "topic": "Async JS", "subtopic": "Structured concurrency", "difficulty": "Hard", "type": "Conceptual", "question": "What is the problem that structured concurrency tries to solve?", "options": {"A": "Making code faster", "B": "Ensuring async tasks spawned by a scope are always cleaned up when that scope exits", "C": "Replacing Promises", "D": "Limiting memory usage"}, "answer": "B", "explanation": "Structured concurrency ensures that spawned async tasks don't outlive their parent scope. When the parent exits (normally or via error), all child tasks are cancelled. Prevents orphaned background tasks and resource leaks. Implemented in Python's asyncio, Swift's async/await, and proposed for JS."}, {"id": 229, "topic": "Core JS", "subtopic": "Array sort stability", "difficulty": "Hard", "type": "Conceptual", "question": "Is JavaScript's Array.sort() stable?", "options": {"A": "No \u2014 it's always unstable (uses quicksort)", "B": "Yes \u2014 guaranteed stable since ES2019 (ECMAScript 10)", "C": "Depends on the browser", "D": "Only stable for arrays under 10 elements"}, "answer": "B", "explanation": "Since ECMAScript 2019, the spec requires `.sort()` to be stable (elements with equal sort keys maintain their original relative order). Before this, browsers were inconsistent. Modern V8, SpiderMonkey, JavaScriptCore all implement stable sort (TimSort in V8)."}, {"id": 230, "topic": "DOM & Browser APIs", "subtopic": "Performance API", "difficulty": "Hard", "type": "Conceptual", "question": "What does `performance.now()` offer over `Date.now()`?", "options": {"A": "It shows the current date and time", "B": "High-resolution time (sub-millisecond) relative to page load, not affected by system clock changes", "C": "It only works in Node.js", "D": "It shows server time"}, "answer": "B", "explanation": "`performance.now()` returns a DOMHighResTimeStamp in milliseconds with microsecond precision. It's measured from `navigationStart` (page load), not Unix epoch. Monotonically increasing \u2014 not affected by system clock adjustments. Preferred for benchmarking and animation timing."}, {"id": 231, "topic": "Coding Logic", "subtopic": "Coin change", "difficulty": "Hard", "type": "Conceptual", "question": "What algorithm optimally solves the coin change problem (minimum coins)?", "options": {"A": "Greedy (always pick largest coin) \u2014 always optimal", "B": "Greedy \u2014 sometimes optimal but not always", "C": "Dynamic Programming \u2014 always optimal", "D": "Brute force recursion \u2014 O(n!)"}, "answer": "C", "explanation": "Greedy fails for some coin sets (e.g., coins [1,3,4], amount=6: greedy picks 4+1+1=3 coins, but 3+3=2 coins is optimal). Dynamic Programming: `dp[i] = min(dp[i], dp[i-coin]+1)` for each coin. Guaranteed optimal solution in O(amount \u00d7 coins) time."}, {"id": 232, "topic": "Core JS", "subtopic": "Prototype chain lookup cost", "difficulty": "Hard", "type": "Conceptual", "question": "What happens when you access a property that doesn't exist on an object or its entire prototype chain?", "options": {"A": "TypeError is thrown", "B": "undefined is returned after traversing the entire chain to null", "C": "null is returned", "D": "ReferenceError is thrown"}, "answer": "B", "explanation": "JS traverses the prototype chain: object \u2192 prototype \u2192 prototype's prototype \u2192 ... \u2192 `Object.prototype` \u2192 null. If the property isn't found anywhere, `undefined` is returned (no error). Only accessing a property on `null` or `undefined` throws TypeError."}, {"id": 233, "topic": "Arrays & Objects", "subtopic": "Array from Set", "difficulty": "Easy", "type": "Coding Logic", "question": "What is the most concise way to get unique values AND sort them?", "options": {"A": "arr.filter((v,i) => arr.indexOf(v)===i).sort()", "B": "[...new Set(arr)].sort((a,b) => a-b)", "C": "Array.from(new Set(arr)).sort()", "D": "Both B and C are equally concise, B slightly more so"}, "answer": "D", "explanation": "Both B and C produce the same result. B uses spread (more concise). C uses Array.from (more explicit). Both create a Set for uniqueness, then sort numerically. For string arrays, `.sort()` without comparator works fine."}, {"id": 234, "topic": "Core JS", "subtopic": "Temporal Dead Zone in let", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst x = 1;\nfunction foo() {\n  console.log(x);\n  const x = 2;\n}\nfoo();", "options": {"A": "1", "B": "2", "C": "undefined", "D": "ReferenceError"}, "answer": "D", "explanation": "`const x` inside `foo` creates a block-scoped binding that's in TDZ before the declaration. Even though outer `const x = 1` exists, the inner `x` shadows it and is in TDZ. Accessing before declaration throws ReferenceError \u2014 the outer x is NOT accessible."}, {"id": 235, "topic": "Functional Programming", "subtopic": "Monad chaining", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst double = x => [x * 2];\nconst addOne = x => [x + 1];\nconst result = [5].flatMap(double).flatMap(addOne);\nconsole.log(result);", "options": {"A": "[11]", "B": "[10, 11]", "C": "[6]", "D": "[5, 10, 11]"}, "answer": "A", "explanation": "`[5].flatMap(double)` = `[10]`. `[10].flatMap(addOne)` = `[11]`. `flatMap` maps then flattens one level \u2014 equivalent to monadic `chain`/`bind`. Arrays as monads: return wraps value, flatMap chains transformations."}, {"id": 236, "topic": "ES6+", "subtopic": "String replaceAll", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconsole.log('aababc'.replaceAll('a', 'x'));", "options": {"A": "xababc", "B": "xxbxbc", "C": "xxbxbc", "D": "aababc"}, "answer": "B", "explanation": "`replaceAll` (ES2021) replaces ALL occurrences of the search string. 'a\u2192x': positions 0,1,3 \u2192 'xxbxbc'. Unlike `replace` with a string (only first match)."}, {"id": 237, "topic": "Async JS", "subtopic": "ReadableStream", "difficulty": "Hard", "type": "Conceptual", "question": "What is the Streams API (ReadableStream) used for?", "options": {"A": "Playing audio streams", "B": "Processing data piece by piece as it arrives, without loading everything into memory", "C": "Streaming CSS animations", "D": "Live video capture"}, "answer": "B", "explanation": "ReadableStream allows processing chunked data: fetch response body is a ReadableStream. You can process a 1GB file chunk by chunk without loading all into memory. `response.body.getReader()` gives a reader with `.read()` for each chunk. Fundamental for performance-critical data processing."}, {"id": 238, "topic": "Core JS", "subtopic": "Comma operator redux", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nlet i = 0;\nconst result = (i++, i++, i);\nconsole.log(result, i);", "options": {"A": "0, 2", "B": "2, 2", "C": "1, 2", "D": "0, 0"}, "answer": "B", "explanation": "Comma operator evaluates left to right and returns last. `i++` (post-increment): first i++ \u2192 i becomes 1. Second i++ \u2192 i becomes 2. `i` returns 2. Result: 2. `i` after is also 2."}, {"id": 239, "topic": "Arrays & Objects", "subtopic": "Deep clone array of objects", "difficulty": "Hard", "type": "Coding Logic", "question": "How do you deep clone an array of objects in the most modern way?", "options": {"A": "[...arr]", "B": "arr.map(obj => ({...obj}))", "C": "structuredClone(arr)", "D": "JSON.parse(JSON.stringify(arr))"}, "answer": "C", "explanation": "`structuredClone(arr)` deep clones the entire structure including nested objects, Dates, Maps, Sets \u2014 the modern native way. `[...arr]` is shallow. `arr.map(obj => ({...obj}))` is one level deep (shallow for each object). `JSON.parse/stringify` loses special types."}, {"id": 240, "topic": "Core JS", "subtopic": "Prototype toString Array", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, 3];\nconsole.log(arr.toString());\nconsole.log(arr.join('-'));", "options": {"A": "[1,2,3], 1-2-3", "B": "1,2,3, 1-2-3", "C": "1 2 3, 1-2-3", "D": "[1,2,3], [1-2-3]"}, "answer": "B", "explanation": "`arr.toString()` calls `join(',')` with comma delimiter: '1,2,3'. `arr.join('-')` joins with dash: '1-2-3'."}, {"id": 241, "topic": "OOP & Prototypes", "subtopic": "Applying mixins", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst Flying = Base => class extends Base {\n  fly() { return 'I can fly!'; }\n};\nconst Swimming = Base => class extends Base {\n  swim() { return 'I can swim!'; }\n};\nclass Animal {}\nclass Duck extends Flying(Swimming(Animal)) {}\nconst d = new Duck();\nconsole.log(d.fly(), d.swim());", "options": {"A": "TypeError", "B": "I can fly! I can swim!", "C": "I can fly! undefined", "D": "undefined I can swim!"}, "answer": "B", "explanation": "Chained mixins: `Swimming(Animal)` creates a class extending Animal with `swim`. `Flying(Swimming(Animal))` adds `fly`. Duck extends that. `d` has both `fly()` and `swim()` through the mixin chain."}, {"id": 242, "topic": "Coding Logic", "subtopic": "Count words", "difficulty": "Easy", "type": "Coding Logic", "question": "What is the output?\n\nconst text = 'the quick brown fox the fox';\nconst count = text.split(' ').reduce((acc, word) => {\n  acc[word] = (acc[word] || 0) + 1;\n  return acc;\n}, {});\nconsole.log(count['the'], count['fox']);", "options": {"A": "1, 1", "B": "2, 2", "C": "2, 1", "D": "1, 2"}, "answer": "B", "explanation": "'the' appears at positions 0 and 4 \u2192 count 2. 'fox' appears at positions 3 and 5 \u2192 count 2."}, {"id": 243, "topic": "Core JS", "subtopic": "Numeric separator", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(1_000_000);\nconsole.log(0xFF_FF);", "options": {"A": "TypeError, TypeError", "B": "1000000, 65535", "C": "'1_000_000', '0xFF_FF'", "D": "1_000_000, 65535"}, "answer": "B", "explanation": "Numeric separators (ES2021): `_` can be used for readability in numeric literals. `1_000_000` = 1000000. `0xFF_FF` = 0xFFFF = 65535. The separator is syntactic sugar \u2014 no effect on the value."}, {"id": 244, "topic": "Async JS", "subtopic": "Scheduler API", "difficulty": "Hard", "type": "Conceptual", "question": "What does `scheduler.postTask()` do?", "options": {"A": "Posts a message to a Web Worker", "B": "Schedules a task with a priority level, allowing the browser to interleave rendering between tasks", "C": "Schedules CSS animations", "D": "Sends an HTTP request"}, "answer": "B", "explanation": "`scheduler.postTask(fn, { priority })` (experimental API) schedules tasks with 'user-blocking', 'user-visible', or 'background' priority. High-priority tasks run before low-priority ones. Allows cooperative scheduling \u2014 breaking up long tasks so the browser can render between them."}, {"id": 245, "topic": "Core JS", "subtopic": "Comma in switch", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst day = 'Mon';\nswitch(day) {\n  case 'Mon':\n  case 'Tue':\n  case 'Wed':\n    console.log('Weekday');\n    break;\n  case 'Sat':\n  case 'Sun':\n    console.log('Weekend');\n    break;\n}", "options": {"A": "Mon", "B": "Weekday", "C": "Nothing", "D": "Weekend"}, "answer": "B", "explanation": "Multiple cases with no `break` between them share the same body (intentional fallthrough). 'Mon' matches, falls through to 'Tue', falls through to 'Wed' where the body executes: 'Weekday'. Then `break` exits."}, {"id": 246, "topic": "Arrays & Objects", "subtopic": "Array.from generator", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output?\n\nconst range = (start, end) => Array.from(\n  { length: end - start },\n  (_, i) => i + start\n);\nconsole.log(range(1, 6));", "options": {"A": "[0,1,2,3,4]", "B": "[1,2,3,4,5]", "C": "[1,2,3,4,5,6]", "D": "[2,3,4,5,6]"}, "answer": "B", "explanation": "`length: 6-1=5`. Map function: at index 0 \u2192 0+1=1, index 1 \u2192 1+1=2, ..., index 4 \u2192 4+1=5. Result: `[1,2,3,4,5]`. A clean way to generate ranges without a for loop."}, {"id": 247, "topic": "Coding Logic", "subtopic": "Valid parentheses", "difficulty": "Medium", "type": "Coding Logic", "question": "Which correctly validates balanced parentheses?\n\nconst isValid = str => { ??? }", "options": {"A": "return str.length % 2 === 0", "B": "const stack = [];\nconst map = { ')':'(', ']':'[', '}':'{' };\nfor (const c of str) {\n  if ('([{'.includes(c)) stack.push(c);\n  else if (stack.pop() !== map[c]) return false;\n}\nreturn stack.length === 0;", "C": "return str.split('(').length === str.split(')').length", "D": "return (str.match(/\\(/g)||[]).length === (str.match(/\\)/g)||[]).length"}, "answer": "B", "explanation": "Correct approach: use a stack. For each opening bracket, push. For each closing bracket, pop and verify it matches the corresponding opener. If stack is empty at end, all brackets are balanced. Options A/C/D only count and fail for '([)]' (wrong nesting)."}, {"id": 248, "topic": "Core JS", "subtopic": "Error cause", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the `cause` option in Error constructor (ES2022)?", "options": {"A": "Sets the error message", "B": "Allows chaining errors: `new Error('Outer', { cause: originalError })` to preserve the error chain", "C": "Specifies the file where error occurred", "D": "Makes the error catchable"}, "answer": "B", "explanation": "`new Error('High-level message', { cause: lowLevelError })` chains errors. `error.cause` holds the original error. Allows re-throwing with context while preserving the root cause. Much better than just logging or losing the original error. Accessible as `e.cause` in catch blocks."}, {"id": 249, "topic": "DOM & Browser APIs", "subtopic": "Clipboard API", "difficulty": "Medium", "type": "Coding Logic", "question": "What is the modern way to copy text to clipboard?", "options": {"A": "document.execCommand('copy')", "B": "navigator.clipboard.writeText(text)", "C": "window.copyToClipboard(text)", "D": "Ctrl+C programmatically"}, "answer": "B", "explanation": "`navigator.clipboard.writeText(text)` returns a Promise. Requires HTTPS or localhost and user permission (or a user gesture like a click). The old `document.execCommand('copy')` is deprecated. Must be called in response to a user action in most browsers."}, {"id": 250, "topic": "Async JS", "subtopic": "Concurrent async patterns", "difficulty": "Hard", "type": "Coding Logic", "question": "Which runs fetchUser and fetchPosts concurrently, then uses both results?\n", "options": {"A": "const user = await fetchUser();\nconst posts = await fetchPosts();", "B": "const [user, posts] = await Promise.all([fetchUser(), fetchPosts()]);", "C": "const userP = fetchUser();\nconst postsP = fetchPosts();\nconst user = await userP;\nconst posts = await postsP;", "D": "Both B and C run concurrently; B is cleaner"}, "answer": "D", "explanation": "Option A is sequential (wasteful). Option B: `Promise.all` \u2014 both start simultaneously, `await` waits for both. Option C: both Promises are started BEFORE any await, so they run concurrently \u2014 functionally same as B but verbose. B is preferred for clarity."}, {"id": 251, "topic": "Core JS", "subtopic": "Array destructuring rest first", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, 3, 4, 5];\nconst [, , ...rest] = arr;\nconsole.log(rest);", "options": {"A": "[1,2]", "B": "[3,4,5]", "C": "[4,5]", "D": "[2,3,4,5]"}, "answer": "B", "explanation": "Two commas skip first two elements. `rest` collects everything from index 2 onward: `[3, 4, 5]`. You can combine elision (skipping) with rest patterns."}, {"id": 252, "topic": "OOP & Prototypes", "subtopic": "Namespace pattern", "difficulty": "Medium", "type": "Conceptual", "question": "What was the namespace pattern in pre-ES6 JavaScript?", "options": {"A": "Using global variables for everything", "B": "Grouping related code under a single global object: `const MyApp = { utils: {}, models: {} }`", "C": "Using IIFE for every file", "D": "Prefixing all variable names with the module name"}, "answer": "B", "explanation": "Before ES6 modules, the namespace pattern used a global object as a namespace: `const MyApp = {}; MyApp.utils.format = function(){}`. Reduces global scope pollution compared to bare globals. Replaced by ES6 import/export modules."}, {"id": 253, "topic": "Coding Logic", "subtopic": "Matrix rotation", "difficulty": "Hard", "type": "Conceptual", "question": "How do you rotate an n\u00d7n matrix 90 degrees clockwise in-place?", "options": {"A": "Reverse rows then columns", "B": "Transpose (flip across diagonal) then reverse each row", "C": "Reverse each column then transpose", "D": "Create a new matrix"}, "answer": "B", "explanation": "90\u00b0 clockwise rotation in-place: (1) Transpose: `matrix[i][j]` \u2194 `matrix[j][i]`. (2) Reverse each row. For 90\u00b0 counter-clockwise: transpose then reverse each column. O(n\u00b2) time, O(1) extra space."}, {"id": 254, "topic": "Core JS", "subtopic": "Truthiness in AND", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(1 && 2 && 3);\nconsole.log(1 && 0 && 3);\nconsole.log(0 || false || '' || 'hello');", "options": {"A": "3, false, 'hello'", "B": "true, false, true", "C": "3, 0, 'hello'", "D": "true, 0, 'hello'"}, "answer": "C", "explanation": "`&&` returns first falsy value or last value if all truthy: `1&&2&&3` = 3 (all truthy, return last). `1&&0&&3` = 0 (first falsy). `||` returns first truthy or last value: `0||false||''||'hello'` = 'hello' (first truthy)."}, {"id": 255, "topic": "Async JS", "subtopic": "Event source", "difficulty": "Hard", "type": "Conceptual", "question": "What is Server-Sent Events (SSE) and how does it differ from WebSockets?", "options": {"A": "SSE is bidirectional; WebSockets are one-way", "B": "SSE is one-way server-to-client over HTTP; WebSockets are full-duplex over a separate TCP connection", "C": "They are identical", "D": "SSE is for binary data; WebSockets are for text"}, "answer": "B", "explanation": "SSE (`EventSource`): simple HTTP connection, server pushes text events to client (one-way). Auto-reconnects. WebSockets: full-duplex, binary and text, requires separate protocol upgrade. Use SSE for live feeds, notifications; WebSockets for real-time collaboration, gaming."}, {"id": 256, "topic": "Core JS", "subtopic": "Getter enumerable", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst obj = { get x() { return 42; } };\nconsole.log(Object.keys(obj));\nconsole.log('x' in obj);\nconsole.log(obj.hasOwnProperty('x'));", "options": {"A": "['x'], true, true", "B": "[], true, true", "C": "['x'], false, true", "D": "[], false, false"}, "answer": "A", "explanation": "Getter `get x()` defines an enumerable property `x`. `Object.keys` includes enumerable own properties \u2192 `['x']`. `'x' in obj` \u2192 true (property exists). `hasOwnProperty('x')` \u2192 true (it's an own property). Getters behave like normal enumerable properties for these checks."}, {"id": 257, "topic": "Coding Logic", "subtopic": "Binary tree height", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output?\n\nfunction height(node) {\n  if (!node) return 0;\n  return 1 + Math.max(height(node.left), height(node.right));\n}\nconst tree = { val:1, left:{val:2, left:{val:4,left:null,right:null}, right:null}, right:{val:3,left:null,right:null} };\nconsole.log(height(tree));", "options": {"A": "2", "B": "3", "C": "4", "D": "1"}, "answer": "B", "explanation": "Root(1) \u2192 left(2) \u2192 left(4) is deepest. Height: 4 is a leaf \u2192 height 1. 2's height: 1+max(1,0)=2. 3 is a leaf \u2192 height 1. Root: 1+max(2,1)=3."}, {"id": 258, "topic": "Core JS", "subtopic": "Regex lookahead", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output?\n\nconst str = 'password123';\nconsole.log(/(?=.*[A-Z])(?=.*[0-9]).{8,}/.test(str));", "options": {"A": "true", "B": "false", "C": "TypeError", "D": "undefined"}, "answer": "B", "explanation": "The regex requires: uppercase letter `(?=.*[A-Z])` \u2014 'password123' has no uppercase \u2192 false. Lookahead assertions (`(?=...)`) are zero-width checks. The password fails the uppercase requirement."}, {"id": 259, "topic": "Arrays & Objects", "subtopic": "Object.fromEntries", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst map = new Map([['a',1],['b',2],['c',3]]);\nconst obj = Object.fromEntries(map);\nconsole.log(obj);", "options": {"A": "Map { a:1, b:2, c:3 }", "B": "{ a:1, b:2, c:3 }", "C": "[['a',1],['b',2],['c',3]]", "D": "TypeError"}, "answer": "B", "explanation": "`Object.fromEntries` converts any iterable of `[key, value]` pairs to an object. Map iterates as `[key, value]` pairs. Result: `{ a:1, b:2, c:3 }`. The reverse of `Object.entries()`."}, {"id": 260, "topic": "Async JS", "subtopic": "Batch processing", "difficulty": "Hard", "type": "Coding Logic", "question": "How do you process an array in batches of 5 items concurrently?", "options": {"A": "Just use Promise.all \u2014 it handles batching", "B": "Split array into chunks of 5, then await Promise.all for each chunk sequentially", "C": "Use setTimeout batching", "D": "Use setInterval"}, "answer": "B", "explanation": "Chunk + sequential: `for (const batch of chunk(arr, 5)) { await Promise.all(batch.map(process)); }`. Each batch of 5 runs concurrently, but the next batch waits for the current batch to finish. Prevents overwhelming the server with all-at-once requests."}, {"id": 261, "topic": "Core JS", "subtopic": "Prototype enumerable", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nfunction Foo() { this.own = 1; }\nFoo.prototype.inherited = 2;\nconst f = new Foo();\nconst ownKeys = [];\nconst allKeys = [];\nfor (const k in f) {\n  allKeys.push(k);\n  if (f.hasOwnProperty(k)) ownKeys.push(k);\n}\nconsole.log(ownKeys, allKeys);", "options": {"A": "['own'], ['own']", "B": "['own'], ['own','inherited']", "C": "['own','inherited'], ['own','inherited']", "D": "['inherited'], ['own','inherited']"}, "answer": "B", "explanation": "`for...in` traverses own AND inherited enumerable properties. `allKeys`: ['own','inherited']. `hasOwnProperty` filters: only 'own'. Result: `['own']`, `['own','inherited']`."}, {"id": 262, "topic": "Edge Cases", "subtopic": "Object spreading with getter", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst src = { get x() { return Math.random(); } };\nconst copy = { ...src };\nconsole.log(copy.x === copy.x);", "options": {"A": "false always", "B": "true always", "C": "Sometimes true, sometimes false", "D": "TypeError"}, "answer": "B", "explanation": "Spreading INVOKES the getter ONCE and copies the RESULT as a data property. `copy.x` is a static value (not a getter). So `copy.x === copy.x` compares the same value \u2014 always true. The getter runs once during spread, not on every access of `copy.x`."}, {"id": 263, "topic": "Coding Logic", "subtopic": "Longest substring no repeat", "difficulty": "Hard", "type": "Conceptual", "question": "What algorithm finds the longest substring without repeating characters in O(n)?", "options": {"A": "Generate all substrings \u2014 O(n\u00b3)", "B": "Sliding window with a Set: expand right, shrink left when duplicate found \u2014 O(n)", "C": "Sorting the string first", "D": "Dynamic programming with 2D table"}, "answer": "B", "explanation": "Sliding window: maintain a Set of chars in current window. Expand right (add char). If char already in Set \u2192 shrink from left until it's removed. Track max window size. O(n) \u2014 each char is added and removed at most once."}, {"id": 264, "topic": "DOM & Browser APIs", "subtopic": "Content Security Policy", "difficulty": "Hard", "type": "Conceptual", "question": "How does Content Security Policy (CSP) prevent XSS?", "options": {"A": "CSP encrypts all JavaScript", "B": "CSP header tells the browser which sources are allowed for scripts, styles, and other resources", "C": "CSP blocks all inline JavaScript", "D": "CSP is a JavaScript library for input sanitization"}, "answer": "B", "explanation": "CSP is an HTTP response header: `Content-Security-Policy: script-src 'self' https://trusted.com`. The browser blocks scripts from unauthorized origins. `'unsafe-inline'` is needed for inline scripts (defeats purpose). Effective against injected scripts from XSS attacks."}, {"id": 265, "topic": "Core JS", "subtopic": "Generator composition", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output?\n\nfunction* take(n, iter) {\n  let count = 0;\n  for (const val of iter) {\n    if (count++ >= n) return;\n    yield val;\n  }\n}\nfunction* naturals() { let n = 1; while(true) yield n++; }\nconsole.log([...take(5, naturals())]);", "options": {"A": "[1,2,3,4,5]", "B": "[1,2,3,4]", "C": "Infinite loop", "D": "[0,1,2,3,4]"}, "answer": "A", "explanation": "`naturals()` generates infinite sequence. `take(5, ...)` takes first 5 values: yields 1,2,3,4,5, then returns. Spreading collects `[1,2,3,4,5]`. Generator composition allows lazy infinite sequence processing."}, {"id": 266, "topic": "Arrays & Objects", "subtopic": "Chaining with null check", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst data = [\n  { user: { name: 'Ali', tags: ['js', 'react'] } },\n  { user: null },\n  { user: { name: 'Sara', tags: [] } }\n];\nconst names = data.map(d => d.user?.name ?? 'Unknown');\nconsole.log(names);", "options": {"A": "['Ali', null, 'Sara']", "B": "['Ali', 'Unknown', 'Sara']", "C": "['Ali', undefined, 'Sara']", "D": "TypeError"}, "answer": "B", "explanation": "`d.user?.name`: for null user \u2192 undefined. `undefined ?? 'Unknown'` \u2192 'Unknown'. Result: ['Ali', 'Unknown', 'Sara']. Combining optional chaining with nullish coalescing is a common defensive pattern."}, {"id": 267, "topic": "Async JS", "subtopic": "Promise.any vs race", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nPromise.any([\n  Promise.reject('err1'),\n  Promise.reject('err2'),\n  Promise.resolve('success')\n]).then(v => console.log(v)).catch(e => console.log(e));", "options": {"A": "err1", "B": "success", "C": "AggregateError", "D": "err2"}, "answer": "B", "explanation": "`Promise.any` resolves with the first FULFILLED promise, ignoring rejections. The third promise resolves with 'success'. Even though the first two reject, `any` finds the first success \u2192 logs 'success'. Only if ALL reject does it throw AggregateError."}, {"id": 268, "topic": "Core JS", "subtopic": "Object method shorthand this", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst obj = {\n  count: 0,\n  add: function() { this.count++; return this; },\n  subtract: function() { this.count--; return this; },\n  value: function() { return this.count; }\n};\nconsole.log(obj.add().add().subtract().value());", "options": {"A": "0", "B": "1", "C": "2", "D": "-1"}, "answer": "B", "explanation": "Method chaining via `return this`. Start: count=0. `.add()` \u2192 count=1, returns obj. `.add()` \u2192 count=2. `.subtract()` \u2192 count=1. `.value()` \u2192 returns 1."}, {"id": 269, "topic": "Coding Logic", "subtopic": "Moving average", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output of this sliding window average?\n\nfunction movingAvg(arr, k) {\n  let sum = arr.slice(0, k).reduce((a, b) => a + b, 0);\n  const result = [sum / k];\n  for (let i = k; i < arr.length; i++) {\n    sum += arr[i] - arr[i - k];\n    result.push(sum / k);\n  }\n  return result;\n}\nconsole.log(movingAvg([1,2,3,4,5], 3));", "options": {"A": "[2,3,4]", "B": "[2,2.67,3.33]", "C": "[1,2,3,4,5]", "D": "[6,9,12]"}, "answer": "A", "explanation": "Window size 3. Initial sum: 1+2+3=6, avg=2. Slide: add 4, remove 1 \u2192 sum=9, avg=3. Slide: add 5, remove 2 \u2192 sum=12, avg=4. Result: [2, 3, 4]."}, {"id": 270, "topic": "OOP & Prototypes", "subtopic": "Object.create inheritance", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the correct pre-ES6 inheritance pattern?", "options": {"A": "Child.prototype = Parent.prototype", "B": "Child.prototype = Object.create(Parent.prototype);\nChild.prototype.constructor = Child;", "C": "Child.prototype.__proto__ = Parent.prototype", "D": "Child = Object.assign({}, Parent)"}, "answer": "B", "explanation": "Option A: shares the same prototype object (modifications to Child.prototype affect Parent). Option B: creates a new object with `Parent.prototype` as its prototype (correct inheritance). Resetting `.constructor` is important for `instanceof` and `new Child()` to work correctly."}, {"id": 271, "topic": "Edge Cases", "subtopic": "typeof in TDZ", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\ntypeof undeclaredVar; // A\ntypeof undeclaredLet; // B (let undeclaredLet is never declared)\nlet x = 1; // Note: 'undeclaredLet' was never declared", "options": {"A": "undefined, ReferenceError", "B": "undefined, undefined", "C": "ReferenceError, ReferenceError", "D": "undefined, TypeError"}, "answer": "B", "explanation": "`typeof` is safe for truly undeclared variables \u2014 returns 'undefined'. Since `undeclaredLet` is never declared at all (unlike being in TDZ), `typeof undeclaredLet` returns 'undefined'. TDZ only applies when a `let`/`const` is declared in the same scope but before the declaration line."}, {"id": 272, "topic": "Async JS", "subtopic": "Deferred promise pattern", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the 'deferred' promise pattern?", "options": {"A": "A Promise that runs after a delay", "B": "Exposing resolve/reject outside the constructor: `const deferred = {}; deferred.promise = new Promise((res,rej) => { deferred.resolve=res; deferred.reject=rej; })`", "C": "A Promise chain with setTimeout", "D": "Using lazy evaluation for Promises"}, "answer": "B", "explanation": "Deferred pattern exposes resolve/reject externally. Useful when you need to resolve a promise from outside its constructor (e.g., waiting for a UI event, resolving from a callback-based API). `await deferred.promise` in one place, `deferred.resolve(value)` from elsewhere. Use sparingly \u2014 `new Promise` is usually cleaner."}, {"id": 273, "topic": "Core JS", "subtopic": "Constructor return object", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nfunction Box(value) {\n  this.value = value;\n  if (value < 0) return { value: 0, clamped: true };\n}\nconst a = new Box(5);\nconst b = new Box(-3);\nconsole.log(a instanceof Box, b instanceof Box);", "options": {"A": "true, true", "B": "true, false", "C": "false, true", "D": "false, false"}, "answer": "B", "explanation": "When constructor returns an object, that object becomes the result of `new`. `a = new Box(5)`: no explicit return \u2192 `this` is returned \u2192 `a instanceof Box` = true. `b = new Box(-3)`: returns `{ value:0, clamped:true }` (plain object) \u2192 NOT an instance of Box \u2192 false."}, {"id": 274, "topic": "Arrays & Objects", "subtopic": "Object.keys length", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst obj = { a: 1, b: 2, c: 3 };\nconst isEmpty = o => Object.keys(o).length === 0;\nconsole.log(isEmpty({}));\nconsole.log(isEmpty(obj));", "options": {"A": "false, false", "B": "true, false", "C": "true, true", "D": "false, true"}, "answer": "B", "explanation": "`Object.keys({}).length` = 0 \u2192 `isEmpty({})` = true. `Object.keys(obj).length` = 3 \u2192 `isEmpty(obj)` = false. This is the idiomatic way to check if an object has no own enumerable properties."}, {"id": 275, "topic": "Coding Logic", "subtopic": "Unique paths", "difficulty": "Hard", "type": "Conceptual", "question": "How many unique paths are in an m\u00d7n grid moving only right or down?", "options": {"A": "m + n", "B": "m \u00d7 n", "C": "C(m+n-2, m-1) \u2014 combinatorics, solved with DP in O(m\u00d7n)", "D": "2^(m+n)"}, "answer": "C", "explanation": "You must make exactly (m-1) down and (n-1) right moves. Total moves: (m+n-2). Choose which (m-1) are down moves: C(m+n-2, m-1). DP approach: `dp[i][j] = dp[i-1][j] + dp[i][j-1]` is O(m\u00d7n) and intuitive for interviews."}, {"id": 276, "topic": "Core JS", "subtopic": "Array pop return", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, 3];\nconst removed = arr.pop();\nconsole.log(removed, arr);", "options": {"A": "3, [1,2,3]", "B": "3, [1,2]", "C": "[1,2], 3", "D": "undefined, [1,2]"}, "answer": "B", "explanation": "`pop()` removes and returns the LAST element. `removed = 3`. `arr` is mutated to `[1, 2]`."}, {"id": 277, "topic": "Async JS", "subtopic": "Observable vs Promise", "difficulty": "Hard", "type": "Conceptual", "question": "Which best describes the difference in handling: click events vs HTTP requests?", "options": {"A": "Both should use Promises", "B": "Click events \u2192 Observable (multiple values, cancellable); HTTP \u2192 Promise (single response)", "C": "Click events \u2192 Promise; HTTP \u2192 Observable", "D": "Both should use callbacks"}, "answer": "B", "explanation": "Click events fire multiple times \u2014 Observables model this naturally (multiple emissions over time, unsubscribable). HTTP requests produce ONE response \u2014 Promise is ideal (single resolved value, not repeated). RxJS `fromEvent` for events, `from(fetch(...))` for HTTP."}, {"id": 278, "topic": "Core JS", "subtopic": "Prototype method lookup performance", "difficulty": "Hard", "type": "Conceptual", "question": "Why is storing methods on `Constructor.prototype` more efficient than defining them inside the constructor?", "options": {"A": "Prototype methods run faster", "B": "Prototype methods are shared across all instances; constructor methods create a new copy per instance", "C": "Constructor methods aren't accessible from outside", "D": "There's no difference"}, "answer": "B", "explanation": "`function Foo() { this.method = function(){} }`: each `new Foo()` creates a NEW function object for `method`. For 1000 instances \u2192 1000 function copies. `Foo.prototype.method = function(){}`: ONE function shared by all instances. Classes do this automatically."}, {"id": 279, "topic": "ES6+", "subtopic": "Exponentiation operator", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(2 ** 10);\nconsole.log((-2) ** 2);\nconsole.log(2 ** -2);", "options": {"A": "1024, 4, 0.25", "B": "1024, -4, 0.25", "C": "20, 4, 0.25", "D": "1024, 4, -0.25"}, "answer": "A", "explanation": "`**` is the exponentiation operator (ES2016). `2**10` = 1024. `(-2)**2` = 4 (parentheses needed to avoid syntax error without them). `2**-2` = 0.25."}, {"id": 280, "topic": "Coding Logic", "subtopic": "Max product subarray", "difficulty": "Hard", "type": "Conceptual", "question": "Why does max product subarray need to track both max and min?", "options": {"A": "For finding both the maximum and minimum product", "B": "Because a negative \u00d7 negative = positive, so the current minimum might become the new maximum", "C": "To handle zeros in the array", "D": "To handle single-element arrays"}, "answer": "B", "explanation": "Track both `maxSoFar` and `minSoFar`. When encountering a negative number, the minimum product (most negative) multiplied by a negative number becomes the maximum. Without tracking min, you'd miss these cases. Reset both at zeros."}, {"id": 281, "topic": "DOM & Browser APIs", "subtopic": "Intersection Observer lazy load", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the correct pattern for lazy loading images with IntersectionObserver?", "options": {"A": "Check scroll position and load if visible", "B": "Observer fires when image enters viewport \u2192 set img.src from img.dataset.src \u2192 unobserve the image", "C": "Load all images on DOMContentLoaded", "D": "Use CSS lazy-loading only"}, "answer": "B", "explanation": "Pattern: `const io = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { e.target.src = e.target.dataset.src; io.unobserve(e.target); } }); }); imgs.forEach(img => io.observe(img));`. Unobserving after load prevents re-triggering."}, {"id": 282, "topic": "Core JS", "subtopic": "String slice vs substring", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log('hello'.slice(1, 3));\nconsole.log('hello'.slice(-2));\nconsole.log('hello'.substring(1, 3));\nconsole.log('hello'.substring(3, 1));", "options": {"A": "el, lo, el, el", "B": "el, lo, el, ol", "C": "ell, lo, el, el", "D": "el, ello, el, TypeError"}, "answer": "A", "explanation": "`slice(1,3)` = 'el'. `slice(-2)` = last 2 chars = 'lo'. `substring(1,3)` = 'el'. `substring(3,1)` = swaps args if start>end, so `substring(1,3)` = 'el'. Key diff: `slice` supports negative indices, `substring` doesn't (treats negative as 0) and swaps args."}, {"id": 283, "topic": "Async JS", "subtopic": "async queue pattern", "difficulty": "Hard", "type": "Coding Logic", "question": "What does an async queue pattern ensure?", "options": {"A": "All tasks run simultaneously", "B": "Tasks are processed one at a time in order, with each task waiting for the previous to complete", "C": "Tasks are batched into groups of 5", "D": "Only the latest task runs"}, "answer": "B", "explanation": "Async queue: `let queue = Promise.resolve(); function enqueue(fn) { queue = queue.then(fn); return queue; }`. Each new task is chained onto the previous, guaranteeing sequential execution. Used for rate-limiting APIs, serializing writes."}, {"id": 284, "topic": "Core JS", "subtopic": "Array forEach vs map return", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nconst result = [1,2,3].forEach(n => n * 2);\nconsole.log(result);", "options": {"A": "[2,4,6]", "B": "undefined", "C": "[1,2,3]", "D": "NaN"}, "answer": "B", "explanation": "`forEach` always returns `undefined` \u2014 it's used for side effects, not transformations. If you need a new array, use `map`. This is a very common mistake in interviews."}, {"id": 285, "topic": "Edge Cases", "subtopic": "this in class vs function", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nclass MyClass {\n  value = 42;\n  regular() { return this?.value; }\n  arrow = () => this?.value;\n}\nconst obj = new MyClass();\nconst { regular, arrow } = obj;\nconsole.log(regular());\nconsole.log(arrow());", "options": {"A": "42, 42", "B": "undefined, 42", "C": "42, undefined", "D": "undefined, undefined"}, "answer": "B", "explanation": "Destructuring `regular` loses its `this` context \u2014 called without context, `this` is undefined in strict mode (classes are strict). `regular()` \u2192 `undefined?.value` = undefined. `arrow` is a class field arrow function \u2014 `this` is permanently bound to the instance. `arrow()` \u2192 42."}, {"id": 286, "topic": "Coding Logic", "subtopic": "Permutations", "difficulty": "Hard", "type": "Coding Logic", "question": "How do you generate all permutations of an array using backtracking?", "options": {"A": "Sort the array and shift elements", "B": "For each element, place it first, recursively permute the rest, collect results", "C": "Use Array.permutations()", "D": "Nested for loops up to array length"}, "answer": "B", "explanation": "Backtracking: `function permute(arr, current=[]) { if (!arr.length) results.push(current); for (let i=0; i<arr.length; i++) { permute([...arr.slice(0,i), ...arr.slice(i+1)], [...current, arr[i]]); } }`. Time: O(n!). No built-in method."}, {"id": 287, "topic": "Core JS", "subtopic": "Bitwise operators", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log(5 & 3);\nconsole.log(5 | 3);\nconsole.log(5 ^ 3);\nconsole.log(~5);", "options": {"A": "1, 7, 6, -6", "B": "5, 3, 5, -5", "C": "1, 7, 5, -6", "D": "0, 7, 6, -6"}, "answer": "A", "explanation": "5=101, 3=011. AND: 001=1. OR: 111=7. XOR: 110=6. NOT ~5: inverts all bits in 32-bit int, result = -(5+1) = -6. Bitwise ops work on 32-bit signed integers."}, {"id": 288, "topic": "Arrays & Objects", "subtopic": "Optional index chain", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst arr = [1, 2, null, 4];\nconst result = arr.map(n => n?.toString() ?? 'null value');\nconsole.log(result);", "options": {"A": "['1','2',null,'4']", "B": "['1','2','null value','4']", "C": "['1','2','null','4']", "D": "TypeError"}, "answer": "B", "explanation": "`null?.toString()` \u2192 optional chaining on null \u2192 `undefined`. `undefined ?? 'null value'` \u2192 'null value'. Numbers: `1?.toString()` = '1', etc. Result: `['1','2','null value','4']`."}, {"id": 289, "topic": "Async JS", "subtopic": "Worker threads", "difficulty": "Hard", "type": "Conceptual", "question": "What is the difference between Web Workers (browser) and Worker Threads (Node.js)?", "options": {"A": "They are identical", "B": "Web Workers run browser scripts with DOM restrictions; Worker Threads in Node.js share memory via SharedArrayBuffer and have access to Node.js APIs", "C": "Worker Threads only work for HTTP servers", "D": "Web Workers are faster"}, "answer": "B", "explanation": "Browser Web Workers: isolated JS execution, no DOM, communicate via `postMessage` (serialized). Node.js Worker Threads: can share memory via `SharedArrayBuffer` + `Atomics`, have access to Node.js core APIs (fs, etc.), better suited for CPU-intensive Node operations."}, {"id": 290, "topic": "Core JS", "subtopic": "typeof class instance", "difficulty": "Easy", "type": "Output-Based", "question": "What is the output?\n\nclass Animal {}\nconst a = new Animal();\nconsole.log(typeof a);\nconsole.log(a instanceof Animal);", "options": {"A": "Animal, true", "B": "object, true", "C": "class, true", "D": "function, true"}, "answer": "B", "explanation": "`typeof` for any object (instance of any class) returns 'object'. There's no 'Animal' or 'class' type in typeof. `instanceof Animal` checks the prototype chain \u2192 true."}, {"id": 291, "topic": "Coding Logic", "subtopic": "Flood fill", "difficulty": "Hard", "type": "Conceptual", "question": "What algorithm is used for flood fill (paint bucket tool)?", "options": {"A": "Sort-based", "B": "BFS or DFS from the starting cell, visiting all connected cells of the same color", "C": "Greedy", "D": "Dynamic programming"}, "answer": "B", "explanation": "Flood fill: start at clicked cell, BFS/DFS outward, changing color of all connected same-colored cells. BFS uses a queue (iterative). DFS uses a stack/recursion. Both work. DFS is simpler to code recursively. Watch for call stack overflow with DFS on large grids."}, {"id": 292, "topic": "DOM & Browser APIs", "subtopic": "requestIdleCallback", "difficulty": "Hard", "type": "Conceptual", "question": "What is `requestIdleCallback` used for?", "options": {"A": "Scheduling code during browser idle time for non-critical background work", "B": "Pausing execution until the user is idle", "C": "Replacing requestAnimationFrame", "D": "Detecting when the user closes the tab"}, "answer": "A", "explanation": "`requestIdleCallback(fn)` schedules `fn` to run when the browser's main thread has spare time between frames. Ideal for: prefetching, analytics, non-critical caches. The callback receives a `deadline` object with `timeRemaining()` to check available time."}, {"id": 293, "topic": "Core JS", "subtopic": "Tagged template with HTML", "difficulty": "Hard", "type": "Coding Logic", "question": "How can tagged template literals prevent XSS in dynamic HTML?", "options": {"A": "They automatically escape values", "B": "A custom tag function can escape HTML entities in interpolated values before inserting into the template", "C": "Template literals always sanitize user input", "D": "XSS is not a concern with template literals"}, "answer": "B", "explanation": "`html\\`<div>\\${userInput}</div>\\`` where `html` is a custom tag that escapes `<`, `>`, `&`, `\"` in the interpolated values. The template literal itself doesn't escape \u2014 the TAG function does. This is how libraries like lit-html safely render user data."}, {"id": 294, "topic": "Arrays & Objects", "subtopic": "Deep merge", "difficulty": "Hard", "type": "Coding Logic", "question": "How do you deeply merge two objects in JavaScript?", "options": {"A": "{ ...obj1, ...obj2 } \u2014 always works", "B": "Object.assign(obj1, obj2) \u2014 always works", "C": "Recursive function: for nested objects, recurse; for primitives, take second value; handle arrays carefully", "D": "JSON.parse(JSON.stringify({ ...obj1, ...obj2 }))"}, "answer": "C", "explanation": "Spread and Object.assign are SHALLOW \u2014 nested objects are overwritten, not merged. Deep merge requires recursion: for each key, if both values are plain objects, recursively merge; otherwise, take the source value. Libraries: lodash `merge`, Ramda `mergeDeepRight`."}, {"id": 295, "topic": "Async JS", "subtopic": "Streaming JSON", "difficulty": "Hard", "type": "Conceptual", "question": "How do you handle a large JSON response without loading it all into memory?", "options": {"A": "JSON.parse always loads fully \u2014 no alternative", "B": "Use a streaming JSON parser that processes chunks from a ReadableStream, emitting objects as they're parsed", "C": "Use localStorage to chunk the response", "D": "Split the JSON by line breaks"}, "answer": "B", "explanation": "Streaming JSON: use libraries like `streaming-json-parser`, `JSONStream` (Node), or handle the `response.body` ReadableStream manually. Parse chunks incrementally, emitting complete objects. Essential for large API responses, NDJSON (newline-delimited JSON), etc."}, {"id": 296, "topic": "Core JS", "subtopic": "Function prototype", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nfunction foo() {}\nconsole.log(typeof foo.prototype);\nconsole.log(typeof foo.prototype.constructor);", "options": {"A": "function, function", "B": "object, function", "C": "object, object", "D": "undefined, undefined"}, "answer": "B", "explanation": "Every function has a `prototype` property (an object): `typeof foo.prototype` = 'object'. The prototype has a `constructor` property pointing back to the function: `typeof foo.prototype.constructor` = 'function'."}, {"id": 297, "topic": "Edge Cases", "subtopic": "Conditional method call", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst handlers = {\n  click: null,\n  hover: () => 'hovered'\n};\nconsole.log(handlers.click?.());\nconsole.log(handlers.hover?.());", "options": {"A": "null, hovered", "B": "undefined, hovered", "C": "TypeError, hovered", "D": "null, undefined"}, "answer": "B", "explanation": "`handlers.click` is `null`. `null?.()` \u2014 optional call on null \u2192 `undefined` (doesn't throw). `handlers.hover?.()` \u2014 hover is a function, calling it returns 'hovered'."}, {"id": 298, "topic": "Coding Logic", "subtopic": "String parsing", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output?\n\nfunction parseQuery(query) {\n  return Object.fromEntries(\n    query.split('&').map(pair => pair.split('='))\n  );\n}\nconsole.log(parseQuery('name=Ali&age=25&city=Mumbai'));", "options": {"A": "{ name:'Ali', age:'25', city:'Mumbai' }", "B": "['name=Ali','age=25','city=Mumbai']", "C": "TypeError", "D": "{ 'name=Ali':undefined, 'age=25':undefined }"}, "answer": "A", "explanation": "Split by '&': `['name=Ali','age=25','city=Mumbai']`. Map split by '=': `[['name','Ali'],['age','25'],['city','Mumbai']]`. `Object.fromEntries` converts to object. Note: real URL parsing should use `URLSearchParams` for proper decoding."}, {"id": 299, "topic": "Core JS", "subtopic": "Array reduce initial value", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log([1].reduce((a, b) => a + b));\nconsole.log([].reduce((a, b) => a + b, 0));\ntry { [].reduce((a, b) => a + b); } catch(e) { console.log(e.constructor.name); }", "options": {"A": "1, 0, TypeError", "B": "1, 0, RangeError", "C": "undefined, 0, TypeError", "D": "1, undefined, TypeError"}, "answer": "A", "explanation": "`[1].reduce(fn)`: single element, no initial value \u2192 returns that element (1). `[].reduce(fn, 0)`: empty array with initial value \u2192 returns initial value (0). `[].reduce(fn)`: empty array with no initial value \u2192 throws TypeError. Always provide initial value!"}, {"id": 300, "topic": "Async JS", "subtopic": "async error types", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nasync function test() {\n  throw 'string error';\n}\ntest().catch(e => console.log(typeof e, e));", "options": {"A": "Error string error", "B": "string string error", "C": "object string error", "D": "TypeError"}, "answer": "B", "explanation": "You can throw ANY value from a function, not just Error objects. `throw 'string error'` creates a rejected Promise with the string value 'string error'. `.catch(e => ...)` receives the string. `typeof e` = 'string'. Best practice: throw Error objects, not primitives."}, {"id": 301, "topic": "Core JS", "subtopic": "Object spread non-object", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconsole.log({ ...null });\nconsole.log({ ...undefined });\nconsole.log({ ...'hello' });", "options": {"A": "TypeError, TypeError, TypeError", "B": "{}, {}, { '0':'h','1':'e','2':'l','3':'l','4':'o' }", "C": "null, undefined, 'hello'", "D": "{}, {}, {}"}, "answer": "B", "explanation": "Spreading null/undefined into object: safely ignored, produces `{}`. Spreading a string: string is iterable AND has indexed properties, so produces `{0:'h', 1:'e', 2:'l', 3:'l', 4:'o'}`. Spreading a number or boolean into object: produces `{}`."}, {"id": 302, "topic": "OOP & Prototypes", "subtopic": "Accessor property", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst obj = {};\nObject.defineProperty(obj, 'temperature', {\n  get() { return this._temp; },\n  set(val) { this._temp = val > 100 ? 100 : val; },\n  enumerable: true\n});\nobj.temperature = 150;\nconsole.log(obj.temperature);", "options": {"A": "150", "B": "100", "C": "undefined", "D": "TypeError"}, "answer": "B", "explanation": "The setter clamps the value: `150 > 100 \u2192 this._temp = 100`. The getter returns `this._temp` = 100. `Object.defineProperty` allows creating accessor properties with validation logic."}, {"id": 303, "topic": "Coding Logic", "subtopic": "Number to Roman", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the most efficient approach to convert an integer to Roman numerals?", "options": {"A": "Recursion with modulo", "B": "Greedy: iterate from largest to smallest value in a lookup table, subtract and append symbol", "C": "Binary conversion", "D": "Dynamic programming"}, "answer": "B", "explanation": "Greedy works because Roman numeral values are specifically chosen so greedy is optimal. Table: 1000\u2192M, 900\u2192CM, 500\u2192D, 400\u2192CD, etc. For each value in desc order, while `num >= value`, append symbol and subtract. No backtracking needed."}, {"id": 304, "topic": "Core JS", "subtopic": "Symbol.hasInstance", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the output?\n\nclass EvenNumber {\n  static [Symbol.hasInstance](n) {\n    return Number(n) % 2 === 0;\n  }\n}\nconsole.log(2 instanceof EvenNumber);\nconsole.log(3 instanceof EvenNumber);", "options": {"A": "false, true", "B": "true, false", "C": "TypeError", "D": "true, true"}, "answer": "B", "explanation": "`Symbol.hasInstance` customizes `instanceof` behavior. `2 instanceof EvenNumber` calls `EvenNumber[Symbol.hasInstance](2)` \u2192 `2 % 2 === 0` \u2192 true. `3 instanceof EvenNumber` \u2192 `3 % 2 === 0` \u2192 false. Powerful customization of type checking."}, {"id": 305, "topic": "Async JS", "subtopic": "Long polling", "difficulty": "Hard", "type": "Conceptual", "question": "What is long polling and when would you use it over WebSockets?", "options": {"A": "HTTP requests with long timeouts", "B": "Client sends request, server holds it open until data is available or timeout, then client immediately re-requests", "C": "Polling with exponential backoff", "D": "Server-sent events with JSON"}, "answer": "B", "explanation": "Long polling: client sends HTTP request \u2192 server waits until event occurs (or timeout) \u2192 sends response \u2192 client immediately sends next request. Simulates real-time without WebSockets. Use when: WebSockets are blocked by firewalls, simpler infrastructure needed. Less efficient than WebSockets for high-frequency updates."}, {"id": 306, "topic": "Core JS", "subtopic": "toString radix", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconsole.log((255).toString(16));\nconsole.log((8).toString(2));\nconsole.log((100).toString(8));", "options": {"A": "ff, 1000, 144", "B": "FF, 1000, 144", "C": "255, 8, 100", "D": "f, 100, 14"}, "answer": "A", "explanation": "`toString(radix)` converts number to string in given base. 255 in hex = 'ff' (lowercase). 8 in binary = '1000'. 100 in octal = '144'. The output is lowercase for hex. Useful for color manipulation, bitmask display."}, {"id": 307, "topic": "Coding Logic", "subtopic": "Intersection of arrays", "difficulty": "Medium", "type": "Coding Logic", "question": "What is the most efficient way to find the intersection of two arrays?", "options": {"A": "Nested loops \u2014 O(n\u00b2)", "B": "Convert one to a Set, filter the other by Set membership \u2014 O(n+m)", "C": "Sort both, two-pointer \u2014 O(n log n + m log m)", "D": "Both B and C are efficient; B is simpler"}, "answer": "D", "explanation": "Option B: `const set = new Set(arr1); return arr2.filter(x => set.has(x))` \u2014 O(n+m) time. Option C: sort-and-two-pointer O((n+m)logn) but works without extra space. For interviews, B is simpler and faster. Both are valid answers."}, {"id": 308, "topic": "Core JS", "subtopic": "Prototype chain", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst a = { x: 1 };\nconst b = Object.create(a);\nb.y = 2;\nconsole.log(b.x, b.y, b.hasOwnProperty('x'), b.hasOwnProperty('y'));", "options": {"A": "1, 2, true, true", "B": "1, 2, false, true", "C": "undefined, 2, false, true", "D": "1, 2, true, false"}, "answer": "B", "explanation": "`b = Object.create(a)`: `a` is `b`'s prototype. `b.x` \u2192 found on prototype `a` = 1. `b.y = 2` \u2192 own property. `hasOwnProperty('x')` \u2192 false (inherited). `hasOwnProperty('y')` \u2192 true (own)."}, {"id": 309, "topic": "ES6+", "subtopic": "Class extends expression", "difficulty": "Hard", "type": "Conceptual", "question": "Can `extends` take any expression in JavaScript?", "options": {"A": "No \u2014 only class names", "B": "Yes \u2014 any expression that evaluates to a constructor/class (function, conditional, factory result)", "C": "Only identifiers, not expressions", "D": "Only built-in classes"}, "answer": "B", "explanation": "`extends` accepts any expression that evaluates to a constructor with a valid prototype. Examples: `class A extends SomeFn(){}`, `class B extends condition ? X : Y {}`. This enables mixin patterns like `class C extends Mix(A, B) {}`."}, {"id": 310, "topic": "Async JS", "subtopic": "Async cleanup", "difficulty": "Hard", "type": "Conceptual", "question": "What is the using/Symbol.dispose proposal (TC39)?", "options": {"A": "A way to delete variables", "B": "Automatic resource management: `using resource = acquire()` automatically calls `resource[Symbol.dispose]()` when the block exits", "C": "Garbage collection hints", "D": "A new Promise type"}, "answer": "B", "explanation": "`using` declaration (Stage 3): resources implementing `[Symbol.dispose]()` are automatically cleaned up when the block exits (normally OR via exception). Similar to `try-with-resources` in Java. Also `await using` for async disposal. Eliminates manual cleanup in finally blocks."}, {"id": 311, "topic": "Core JS", "subtopic": "arguments to array", "difficulty": "Medium", "type": "Coding Logic", "question": "What are valid ways to convert the `arguments` object to a real array?", "options": {"A": "arguments.toArray()", "B": "Array.from(arguments) or [...arguments] or Array.prototype.slice.call(arguments)", "C": "arguments.slice()", "D": "new Array(arguments)"}, "answer": "B", "explanation": "`arguments` is array-like but not a real array. Convert with: `Array.from(arguments)`, `[...arguments]` (spread), or the old `Array.prototype.slice.call(arguments)`. The first two are ES6+. In modern code, use rest parameters instead: `function foo(...args) {}` \u2014 `args` is already a real array."}, {"id": 312, "topic": "Coding Logic", "subtopic": "Detect cycle undirected", "difficulty": "Hard", "type": "Conceptual", "question": "How do you detect a cycle in an undirected graph?", "options": {"A": "DFS from any node, check if you visit the same node twice (excluding the parent)", "B": "BFS only", "C": "Sort edges and check", "D": "Count edges vs vertices"}, "answer": "A", "explanation": "DFS with parent tracking: for each node, mark visited. For each neighbor, if visited AND not parent \u2192 cycle exists. Union-Find (DSU) is another approach: for each edge, if both endpoints are in the same set \u2192 cycle. DFS approach is O(V+E)."}, {"id": 313, "topic": "DOM & Browser APIs", "subtopic": "Pointer Events", "difficulty": "Medium", "type": "Conceptual", "question": "Why are Pointer Events preferred over Mouse Events for modern web apps?", "options": {"A": "They're faster", "B": "Pointer Events unify mouse, touch, and stylus input with a single consistent API", "C": "Mouse events are deprecated", "D": "Pointer events work offline"}, "answer": "B", "explanation": "Pointer Events (`pointerdown`, `pointermove`, `pointerup`) handle mouse, touch, and pen/stylus with ONE API. Mouse events don't handle touch; touch events don't handle mouse. Pointer Events simplify cross-device compatibility without separate handlers."}, {"id": 314, "topic": "Core JS", "subtopic": "Sealed vs Frozen enumeration", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst obj = Object.seal({ x: 1 });\nobj.x = 99;\nobj.y = 2;\nconsole.log(obj.x, obj.y);", "options": {"A": "1, 2", "B": "99, undefined", "C": "99, 2", "D": "1, undefined"}, "answer": "B", "explanation": "`Object.seal`: can't ADD new properties, can't DELETE, but CAN change existing values. `obj.x = 99` \u2192 allowed \u2192 99. `obj.y = 2` \u2192 adding new property \u2192 silently fails in non-strict mode. `obj.y` is undefined."}, {"id": 315, "topic": "Async JS", "subtopic": "Promise.withResolvers", "difficulty": "Hard", "type": "Conceptual", "question": "What does `Promise.withResolvers()` (ES2024) do?", "options": {"A": "Creates a Promise with automatic resolution", "B": "Returns `{ promise, resolve, reject }` \u2014 the deferred pattern as a built-in API", "C": "Creates multiple Promises at once", "D": "Wraps a callback function"}, "answer": "B", "explanation": "`const { promise, resolve, reject } = Promise.withResolvers()` is the built-in deferred pattern. Previously you had to manually expose resolve/reject from inside the constructor. Now it's a clean native API. Available in modern browsers and Node 22+."}, {"id": 316, "topic": "Core JS", "subtopic": "Getter lazy evaluation", "difficulty": "Hard", "type": "Coding Logic", "question": "How do you implement a lazy getter that computes once and caches?", "options": {"A": "Use a regular function with memoization", "B": "Object.defineProperty(obj, 'expensive', {\n  get() {\n    const value = computeExpensive();\n    Object.defineProperty(this, 'expensive', { value, writable: false });\n    return value;\n  },\n  configurable: true\n})", "C": "Use let with a flag variable", "D": "Both B and storing in a closure variable work"}, "answer": "B", "explanation": "The self-overwriting getter pattern: first access computes the value and replaces the getter with a plain data property. Subsequent accesses read the cached data property directly. Requires `configurable: true` on the initial getter definition."}, {"id": 317, "topic": "Coding Logic", "subtopic": "Topological sort", "difficulty": "Hard", "type": "Conceptual", "question": "What is topological sort and when is it used?", "options": {"A": "Sorting a topology map", "B": "Linear ordering of nodes in a DAG so each node comes before its dependents \u2014 used for task scheduling, build systems", "C": "Sorting by geographic location", "D": "A stable sort algorithm"}, "answer": "B", "explanation": "Topological sort orders nodes in a Directed Acyclic Graph (DAG) such that for every edge u\u2192v, u comes before v. Used in: package dependency resolution (npm), build systems (Makefile), course prerequisites, task scheduling. Implemented with DFS (reverse postorder) or Kahn's algorithm (BFS)."}, {"id": 318, "topic": "Core JS", "subtopic": "Error stack", "difficulty": "Medium", "type": "Conceptual", "question": "What is `error.stack` in JavaScript?", "options": {"A": "The call stack at the time of error creation", "B": "The number of function calls before the error", "C": "A list of all open connections", "D": "The error history"}, "answer": "A", "explanation": "`error.stack` is a string containing the error message and the call stack trace at the moment the error was created. Format varies by engine. Essential for debugging \u2014 shows the sequence of function calls that led to the error."}, {"id": 319, "topic": "Arrays & Objects", "subtopic": "Spread in function call", "difficulty": "Medium", "type": "Output-Based", "question": "What is the output?\n\nconst nums = [3, 1, 4, 1, 5, 9];\nconsole.log(Math.max(...nums));\nconsole.log(Math.min(...nums));", "options": {"A": "[9], [1]", "B": "9, 1", "C": "TypeError", "D": "NaN, NaN"}, "answer": "B", "explanation": "Spread in function calls: `Math.max(...nums)` is equivalent to `Math.max(3,1,4,1,5,9)` = 9. `Math.min(...nums)` = 1. Before spread, you had to use `Math.max.apply(null, nums)`."}, {"id": 320, "topic": "Async JS", "subtopic": "Async dispose", "difficulty": "Hard", "type": "Conceptual", "question": "What is `Symbol.asyncDispose` used for?", "options": {"A": "Destroying async functions", "B": "Async cleanup in `await using` declarations \u2014 called when block exits for resources needing async cleanup", "C": "Cancelling Promises", "D": "Disposing of Web Workers"}, "answer": "B", "explanation": "`Symbol.asyncDispose` is called by `await using` declarations for async cleanup (like closing a database connection or releasing a file handle asynchronously). `await using conn = await db.connect()` \u2192 `conn[Symbol.asyncDispose]()` is awaited on block exit."}, {"id": 321, "topic": "Core JS", "subtopic": "Regex named groups", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst date = '2024-03-15';\nconst match = date.match(/(?<year>\\d{4})-(?<month>\\d{2})-(?<day>\\d{2})/);\nconsole.log(match.groups.year, match.groups.month);", "options": {"A": "2024 3", "B": "2024 03", "C": "undefined undefined", "D": "TypeError"}, "answer": "B", "explanation": "Named capture groups `(?<name>...)` store captured text in `match.groups.name`. `year` captures '2024', `month` captures '03' (two digits, zero-padded). Modern ES2018 feature, clean alternative to positional `match[1]`, `match[2]`."}, {"id": 322, "topic": "Coding Logic", "subtopic": "Shortest path", "difficulty": "Hard", "type": "Conceptual", "question": "What algorithm finds the shortest path in an unweighted graph?", "options": {"A": "DFS", "B": "BFS \u2014 guarantees shortest path in unweighted graphs by exploring level by level", "C": "Dijkstra's (for unweighted too)", "D": "A*"}, "answer": "B", "explanation": "BFS finds shortest path in unweighted graphs by exploring all nodes at distance d before exploring d+1. Dijkstra works for weighted graphs (including unweighted as edge_weight=1). For unweighted, BFS is simpler O(V+E). A* is heuristic-guided BFS for spatial graphs."}, {"id": 323, "topic": "DOM & Browser APIs", "subtopic": "Form validation API", "difficulty": "Medium", "type": "Coding Logic", "question": "What does `input.checkValidity()` return?", "options": {"A": "The current input value", "B": "true if the input satisfies all constraints (required, min, max, pattern), false otherwise", "C": "An error message string", "D": "undefined"}, "answer": "B", "explanation": "`checkValidity()` checks HTML5 constraint validation. Returns true if valid, false if not. Also fires an 'invalid' event. `input.validity` provides a `ValidityState` object with specific flags (`valueMissing`, `typeMismatch`, `patternMismatch`, etc.)."}, {"id": 324, "topic": "Core JS", "subtopic": "Conditional types at runtime", "difficulty": "Hard", "type": "Output-Based", "question": "What is the most robust runtime type check for 'plain object' (not array, not null)?", "options": {"A": "typeof val === 'object'", "B": "val !== null && typeof val === 'object' && !Array.isArray(val) && Object.getPrototypeOf(val) === Object.prototype", "C": "val instanceof Object", "D": "val.constructor === Object"}, "answer": "B", "explanation": "Robust plain object check: not null (typeof null='object'), typeof must be object, not array, and prototype must be Object.prototype (excludes class instances, Date, Map, etc.). Option A fails for null/arrays. Option C includes functions/arrays. Option D fails for Object.create(null)."}, {"id": 325, "topic": "Async JS", "subtopic": "Concurrent Map with limit", "difficulty": "Hard", "type": "Coding Logic", "question": "What is the result of this pattern?\n\nasync function mapWithLimit(arr, limit, fn) {\n  const results = [];\n  const executing = new Set();\n  for (const item of arr) {\n    const p = fn(item).then(r => { results.push(r); executing.delete(p); });\n    executing.add(p);\n    if (executing.size >= limit) await Promise.race(executing);\n  }\n  await Promise.all(executing);\n  return results;\n}", "options": {"A": "Runs all items sequentially", "B": "Runs at most `limit` items concurrently, starting the next as soon as one completes", "C": "Runs all items at once", "D": "This code has a bug and won't work"}, "answer": "B", "explanation": "This implements a concurrency pool: maintain a Set of executing promises. When set reaches limit, `await Promise.race` waits for the fastest one to complete (which removes itself from the Set). Then add next item. Balances parallelism without overwhelming resources."}, {"id": 326, "topic": "Core JS", "subtopic": "Computed destructuring", "difficulty": "Hard", "type": "Output-Based", "question": "What is the output?\n\nconst key = 'name';\nconst { [key]: value } = { name: 'Zaheer' };\nconsole.log(value);", "options": {"A": "name", "B": "Zaheer", "C": "undefined", "D": "SyntaxError"}, "answer": "B", "explanation": "Computed destructuring: `{ [key]: value }` dynamically uses `key`'s value ('name') as the property to destructure, assigning it to `value`. So `value = obj['name'] = 'Zaheer'`. Useful for dynamic key extraction."}, {"id": 327, "topic": "Coding Logic", "subtopic": "System Design: Rate Limiter", "difficulty": "Hard", "type": "Conceptual", "question": "What algorithm is used in a Token Bucket rate limiter?", "options": {"A": "Tokens accumulate over time (up to max); each request consumes one token; if empty, request is rejected", "B": "Count requests per second, reject if over limit", "C": "Queue all requests and process at fixed intervals", "D": "Random sampling of requests"}, "answer": "A", "explanation": "Token Bucket: bucket holds up to `capacity` tokens. Tokens are added at rate R per second. Each request consumes 1 token. If bucket is empty \u2192 request rejected (or queued). Allows bursting up to capacity, sustains R requests/sec long-term. Popular for APIs (AWS API Gateway uses this)."}];

let filters={diff:'All',type:'All',topic:'All'};
let fQ=[],curIdx=0,selOpt=null,answered=false;
let stats={correct:0,wrong:0,streak:0,skipped:0};
let session={};  // id -> {sel, correct}
let searchQ='';
let toastTimer=null;

/* ── INIT ── */
function init(){
  buildFilters();
  applyFilters();
  document.addEventListener('keydown',handleKey);
}

/* ── FILTER BUILD ── */
function buildFilters(){
  const diffs=['All','Easy','Medium','Hard'];
  const types=['All','Output-Based','Conceptual','Coding Logic'];
  const topics=['All',...new Set(QS.map(q=>q.topic))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));

  renderFilterGroup('diffFilters',diffs,'diff');
  renderFilterGroup('typeFilters',types,'type');
  renderFilterGroup('topicFilters',topics,'topic');
}

function renderFilterGroup(containerId,values,dim){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  values.forEach(v=>{
    const cnt=v==='All'?QS.length:QS.filter(q=>q[dim]===v||q['difficulty']===v||q['type']===v||q['topic']===v).length;
    // refined count
    const c2=v==='All'?QS.length:QS.filter(q=>{
      if(dim==='diff') return q.difficulty===v;
      if(dim==='type') return q.type===v;
      if(dim==='topic') return q.topic===v;
    }).length;
    const b=document.createElement('button');
    b.className='fbtn'+(v==='All'?' active':'');
    b.dataset.dim=dim; b.dataset.val=v;
    let icon='';
    if(dim==='diff'&&v==='Easy') icon='<span class="ddot" style="background:var(--green)"></span>';
    if(dim==='diff'&&v==='Medium') icon='<span class="ddot" style="background:var(--accent)"></span>';
    if(dim==='diff'&&v==='Hard') icon='<span class="ddot" style="background:var(--red)"></span>';
    b.innerHTML=icon+v+' <span class="fc">'+c2+'</span>';
    b.onclick=()=>setFilter(dim,v);
    el.appendChild(b);
  });
}

function setFilter(dim,val){
  filters[dim]=val;
  document.querySelectorAll('.fbtn[data-dim="'+dim+'"]').forEach(b=>{
    b.classList.toggle('active',b.dataset.val===val);
  });
  curIdx=0;
  applyFilters();
}

function doSearch(v){searchQ=v.toLowerCase();curIdx=0;applyFilters();}

/* ── FILTER APPLY ── */
function applyFilters(){
  fQ=QS.filter(q=>{
    if(filters.diff!=='All'&&q.difficulty!==filters.diff) return false;
    if(filters.type!=='All'&&q.type!==filters.type) return false;
    if(filters.topic!=='All'&&q.topic!==filters.topic) return false;
    if(searchQ&&!q.question.toLowerCase().includes(searchQ)&&!q.topic.toLowerCase().includes(searchQ)) return false;
    return true;
  });
  document.getElementById('hTotal').textContent=fQ.length;
  renderQList();
  if(fQ.length>0) renderQ();
  else document.querySelector('.qcard').innerHTML='<div class="empty">No questions match your filters.</div>';
}

/* ── RENDER Q LIST ── */
function renderQList(){
  const list=document.getElementById('qList');
  list.innerHTML='';
  fQ.forEach((q,i)=>{
    const d=document.createElement('div');
    d.className='qi'+(i===curIdx?' cur':'');
    const ans=session[q.id];
    if(ans) d.classList.add(ans.correct?'ok':'bad');
    const preview=q.question.replace(/\n/g,' ').slice(0,44)+'…';
    d.innerHTML='<span class="qnum">'+q.id+'</span><span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+preview+'</span>';
    d.onclick=()=>{curIdx=i;renderQ();renderQList();};
    list.appendChild(d);
  });
  const cur=list.querySelector('.cur');
  if(cur) cur.scrollIntoView({block:'nearest'});
}

/* ── RENDER QUESTION ── */
function renderQ(){
  if(!fQ.length) return;
  const q=fQ[curIdx];
  selOpt=null;
  answered=false;
  const prev=session[q.id];

  // Meta badges
  const dc=q.difficulty.toLowerCase();
  document.getElementById('qMeta').innerHTML=
    '<span class="badge '+dc+'">'+q.difficulty+'</span>'+
    '<span class="badge topic">'+q.topic+'</span>'+
    '<span class="badge type">'+q.type+'</span>'+
    '<span class="qctr">'+(curIdx+1)+' / '+fQ.length+'</span>';

  // Question text + code
  const raw=q.question;
  const nlIdx=raw.indexOf('\n');
  let qHTML='';
  if(nlIdx>0){
    const txt=raw.slice(0,nlIdx);
    const code=raw.slice(nlIdx+1).trim();
    qHTML='<div>'+esc(txt)+'</div>';
    if(code) qHTML+='<div class="code-block">'+esc(code)+'</div>';
  } else {
    qHTML='<div>'+esc(raw)+'</div>';
  }
  document.getElementById('qTxt').innerHTML=qHTML;

  // Options
  const od=document.getElementById('opts');
  od.innerHTML='';
  Object.entries(q.options).forEach(([k,v])=>{
    const b=document.createElement('button');
    b.className='obtn'; b.id='o'+k;
    b.innerHTML='<span class="okey">'+k+'</span><span>'+esc(v)+'</span>';
    b.onclick=()=>pick(k);
    if(prev){
      b.disabled=true;
      if(k===q.answer) b.classList.add('correct');
      if(k===prev.sel&&k!==q.answer) b.classList.add('wrong');
    }
    od.appendChild(b);
  });

  // Explanation
  document.getElementById('explTxt').textContent=q.explanation;
  const expl=document.getElementById('expl');
  if(prev){expl.classList.add('show');answered=true;}
  else expl.classList.remove('show');

  // Buttons
  const sb=document.getElementById('submitBtn');
  const nb=document.getElementById('nextBtn');
  sb.disabled=true; sb.style.display=prev?'none':'';
  nb.style.display=prev?'':'none';

  refreshHeader();
}

/* ── PICK OPTION ── */
function pick(k){
  if(answered) return;
  selOpt=k;
  document.querySelectorAll('.obtn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('o'+k).classList.add('sel');
  document.getElementById('submitBtn').disabled=false;
}

/* ── SUBMIT ── */
function submitAnswer(){
  if(!selOpt||answered) return;
  answered=true;
  const q=fQ[curIdx];
  const ok=selOpt===q.answer;
  document.querySelectorAll('.obtn').forEach(b=>b.disabled=true);
  document.getElementById('o'+q.answer).classList.add('correct');
  if(!ok){
    document.getElementById('o'+selOpt).classList.add('wrong');
    stats.streak=0; stats.wrong++;
    toast('❌ Wrong. Correct: '+q.answer);
  } else {
    stats.streak++; stats.correct++;
    toast('✅ Correct! Streak: '+stats.streak+'🔥');
  }
  session[q.id]={sel:selOpt,correct:ok};
  document.getElementById('expl').classList.add('show');
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='';
  refreshHeader(); renderQList();
}

/* ── REVEAL ── */
function revealAns(){
  if(answered) return;
  answered=true;
  const q=fQ[curIdx];
  document.querySelectorAll('.obtn').forEach(b=>b.disabled=true);
  document.getElementById('o'+q.answer).classList.add('correct');
  document.getElementById('expl').classList.add('show');
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='';
  session[q.id]={sel:'_revealed',correct:false};
  stats.skipped++; stats.streak=0;
  refreshHeader(); renderQList();
  toast('👁 Answer revealed');
}

/* ── SKIP ── */
function skipQ(){
  stats.skipped++;
  session[fQ[curIdx].id]={sel:'_skip',correct:false};
  nextQ();
}

/* ── NEXT ── */
function nextQ(){
  if(curIdx<fQ.length-1){curIdx++;renderQ();renderQList();}
  else toast('🎉 All questions done!');
}

/* ── KEYBOARD ── */
function handleKey(e){
  const tag=e.target.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(['a','b','c','d'].includes(e.key.toLowerCase())) pick(e.key.toUpperCase());
  if(e.key==='Enter'){if(!answered&&selOpt) submitAnswer(); else if(answered) nextQ();}
  if(e.key==='ArrowRight') nextQ();
  if(e.key==='ArrowLeft'){if(curIdx>0){curIdx--;renderQ();renderQList();}}
}

/* ── HEADER REFRESH ── */
function refreshHeader(){
  const done=Object.keys(session).length;
  document.getElementById('hAnswered').textContent=done;
  const acc=done>0?Math.round(stats.correct/done*100):null;
  document.getElementById('hAccuracy').textContent=acc!==null?acc+'%':'—';
  document.getElementById('sCorrect').textContent=stats.correct;
  document.getElementById('sWrong').textContent=stats.wrong;
  document.getElementById('sStreak').textContent=stats.streak;
  document.getElementById('sSkipped').textContent=stats.skipped;
  const pct=fQ.length>0?Math.round(done/fQ.length*100):0;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progTxt').textContent=done+' done';
  document.getElementById('progPct').textContent=pct+'%';
}

/* ── TOAST ── */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ── UTIL ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

init();
</script>
