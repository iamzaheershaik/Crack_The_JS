<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>React – 41 Questions Every Beginner Must Know</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #61dafb;
    --accent2: #f7df1e;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --code-bg: #0d1117;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12122a 100%);
    border-bottom: 1px solid var(--border);
    padding: 60px 24px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(97,218,251,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .react-icon {
    font-size: 48px;
    animation: spin 12s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
    line-height: 1.1;
  }
  header p {
    color: var(--muted);
    margin-top: 10px;
    font-size: 15px;
  }
  .badge {
    display: inline-block;
    margin-top: 18px;
    background: rgba(97,218,251,0.1);
    border: 1px solid rgba(97,218,251,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* ── LAYOUT ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 28px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: rgba(97,218,251,0.3); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px 24px 18px;
    cursor: pointer;
    user-select: none;
  }
  .q-num {
    min-width: 36px; height: 36px;
    background: rgba(97,218,251,0.12);
    border: 1px solid rgba(97,218,251,0.25);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }
  .q-toggle {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-card.open .q-toggle { transform: rotate(45deg); color: var(--accent); }

  .q-body {
    display: none;
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
  }
  .q-card.open .q-body { display: block; }

  .answer {
    padding: 16px 0 0;
    color: #c8c8dc;
    font-size: 14px;
  }
  .answer strong { color: var(--accent); }

  /* ── CODE BLOCK ── */
  .code-wrap {
    margin-top: 16px;
    background: var(--code-bg);
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    overflow: hidden;
  }
  .code-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #161b22;
    border-bottom: 1px solid #2a2a3a;
  }
  .dot { width:10px;height:10px;border-radius:50%; }
  .dot.r{background:#ff5f57;} .dot.y{background:#febc2e;} .dot.g{background:#28c840;}
  .code-label {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  pre {
    padding: 18px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: #c9d1d9;
    white-space: pre;
  }
  /* syntax highlighting via spans */
  .kw  { color: #ff7b72; }
  .fn  { color: #d2a8ff; }
  .str { color: #a5d6ff; }
  .cm  { color: #8b949e; font-style: italic; }
  .tag { color: #7ee787; }
  .attr{ color: #79c0ff; }
  .num { color: #f2cc60; }

  /* ── SECTION DIVIDER ── */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 40px 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  footer span { color: var(--accent); }
  /* PAGE NAV */
  .page-nav{display:flex;align-items:center;gap:.5rem;background:rgba(10,10,15,0.97);border-bottom:1px solid var(--border);padding:.48rem 1.5rem;position:sticky;top:0;z-index:200;overflow-x:auto;scrollbar-width:none;backdrop-filter:blur(12px)}
  .page-nav::-webkit-scrollbar{display:none}
  .page-nav-link{display:inline-flex;align-items:center;gap:.45rem;padding:.36rem .82rem;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600;text-decoration:none;border:1px solid transparent;transition:all .18s;white-space:nowrap;color:var(--muted)}
  .page-nav-link:hover{background:var(--card);color:var(--text)}
  .page-nav-link.pn-mcq{--pnc:#f7df1e}.page-nav-link.pn-mcq:hover,.page-nav-link.pn-mcq.active{color:var(--pnc);border-color:var(--pnc);background:rgba(247,223,30,.08)}
  .page-nav-link.pn-prearray{--pnc:#00bcd4}.page-nav-link.pn-prearray:hover,.page-nav-link.pn-prearray.active{color:var(--pnc);border-color:var(--pnc);background:rgba(0,188,212,.08)}
  .page-nav-link.pn-react.active,.page-nav-link.pn-react:hover{color:var(--accent);border-color:var(--accent);background:rgba(97,218,251,.09)}
  .page-nav-sep{width:1px;height:16px;background:var(--border);margin:0 .2rem}
</style>
</head>

<header>
  <div class="logo">
    <span class="react-icon">⚛</span>
  </div>
  <h1>React — 41 Questions<br/>Every Beginner Must Know</h1>
  <p>Practical answers with working code examples</p>
  <div class="badge">Click any question to expand ↓</div>
</header>

<main id="app"></main>

<footer>Built for React beginners · <span>41 Questions</span> · Click to expand answers</footer>

<script>
const QA = [
  {
    q: "How to display dynamic HTML data in React?",
    a: "Use <strong>JSX</strong> to embed JavaScript expressions inside curly braces <code>{}</code>. For raw HTML strings, use <strong>dangerouslySetInnerHTML</strong> (carefully — XSS risk).",
    code: `<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> name = <span class="str">"Zaheer"</span>;
  <span class="kw">const</span> htmlString = <span class="str">"&lt;b&gt;Bold text&lt;/b&gt; from a string"</span>;

  <span class="kw">return</span> (
    <span class="tag">&lt;div&gt;</span>
      <span class="tag">&lt;p&gt;</span>Hello, {name}!<span class="tag">&lt;/p&gt;</span>       <span class="cm">// ✅ JSX expression</span>
      <span class="tag">&lt;p</span> <span class="attr">dangerouslySetInnerHTML</span>={{ __html: htmlString }} <span class="tag">/&gt;</span>
    <span class="tag">&lt;/div&gt;</span>
  );
}`
  },
  {
    q: "How do you send data from parent to child component?",
    a: "Pass data via <strong>props</strong>. The parent includes the value as an attribute on the child JSX tag. The child receives it in the <code>props</code> object (or via destructuring).",
    code: `<span class="cm">// Parent</span>
<span class="kw">function</span> <span class="fn">Parent</span>() {
  <span class="kw">return</span> <span class="tag">&lt;Child</span> <span class="attr">message</span>=<span class="str">"Hello from parent!"</span> <span class="tag">/&gt;</span>;
}

<span class="cm">// Child</span>
<span class="kw">function</span> <span class="fn">Child</span>({ message }) {
  <span class="kw">return</span> <span class="tag">&lt;p&gt;</span>{message}<span class="tag">&lt;/p&gt;</span>;
}`
  },
  {
    q: "How to call a parent component method from child?",
    a: "Pass the parent's function as a <strong>prop</strong> to the child. The child calls that function (like an event callback).",
    code: `<span class="kw">function</span> <span class="fn">Parent</span>() {
  <span class="kw">const</span> <span class="fn">handleClick</span> = () =&gt; alert(<span class="str">"Parent method called!"</span>);
  <span class="kw">return</span> <span class="tag">&lt;Child</span> <span class="attr">onAction</span>={handleClick} <span class="tag">/&gt;</span>;
}

<span class="kw">function</span> <span class="fn">Child</span>({ onAction }) {
  <span class="kw">return</span> <span class="tag">&lt;button</span> <span class="attr">onClick</span>={onAction}<span class="tag">&gt;</span>Call Parent<span class="tag">&lt;/button&gt;</span>;
}`
  },
  {
    q: "How do you access a DOM element?",
    a: "Use the <strong>useRef</strong> hook. Attach the ref to a JSX element via the <code>ref</code> attribute. Access the real DOM node via <code>ref.current</code>.",
    code: `<span class="kw">import</span> { useRef } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> inputRef = <span class="fn">useRef</span>(<span class="kw">null</span>);

  <span class="kw">const</span> <span class="fn">focusInput</span> = () =&gt; inputRef.current.<span class="fn">focus</span>();

  <span class="kw">return</span> (
    <span class="tag">&lt;&gt;</span>
      <span class="tag">&lt;input</span> <span class="attr">ref</span>={inputRef} <span class="attr">placeholder</span>=<span class="str">"Click button to focus"</span> <span class="tag">/&gt;</span>
      <span class="tag">&lt;button</span> <span class="attr">onClick</span>={focusInput}<span class="tag">&gt;</span>Focus<span class="tag">&lt;/button&gt;</span>
    <span class="tag">&lt;/&gt;</span>
  );
}`
  },
  {
    q: "How to bind an array / array of objects to a dropdown?",
    a: "Use <strong>.map()</strong> inside a <code>&lt;select&gt;</code> to generate <code>&lt;option&gt;</code> elements. Always add a <code>key</code> prop.",
    code: `<span class="kw">const</span> fruits = [<span class="str">"Apple"</span>, <span class="str">"Banana"</span>, <span class="str">"Mango"</span>];

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">return</span> (
    <span class="tag">&lt;select&gt;</span>
      {fruits.<span class="fn">map</span>((fruit) =&gt; (
        <span class="tag">&lt;option</span> <span class="attr">key</span>={fruit} <span class="attr">value</span>={fruit}<span class="tag">&gt;</span>
          {fruit}
        <span class="tag">&lt;/option&gt;</span>
      ))}
    <span class="tag">&lt;/select&gt;</span>
  );
}`
  },
  {
    q: "How to create a lazy-loaded component?",
    a: "Use <strong>React.lazy()</strong> with a dynamic <code>import()</code> and wrap it in <strong>Suspense</strong> to show a fallback while loading.",
    code: `<span class="kw">import</span> { lazy, Suspense } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">const</span> HeavyComponent = <span class="fn">lazy</span>(() =&gt; <span class="fn">import</span>(<span class="str">'./HeavyComponent'</span>));

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">return</span> (
    <span class="tag">&lt;Suspense</span> <span class="attr">fallback</span>=<span class="str">"Loading..."</span><span class="tag">&gt;</span>
      <span class="tag">&lt;HeavyComponent /&gt;</span>
    <span class="tag">&lt;/Suspense&gt;</span>
  );
}`
  },
  {
    q: "How to display data entered by user in another textbox?",
    a: "Use <strong>useState</strong>. Bind the input's value to state and render that state in the second input.",
    code: `<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> [text, setText] = <span class="fn">useState</span>(<span class="str">""</span>);

  <span class="kw">return</span> (
    <span class="tag">&lt;&gt;</span>
      <span class="tag">&lt;input</span> <span class="attr">value</span>={text} <span class="attr">onChange</span>={e =&gt; <span class="fn">setText</span>(e.target.value)} <span class="tag">/&gt;</span>
      <span class="tag">&lt;input</span> <span class="attr">value</span>={text} <span class="attr">readOnly</span> <span class="tag">/&gt;</span>   <span class="cm">// mirrors first input</span>
    <span class="tag">&lt;/&gt;</span>
  );
}`
  },
  {
    q: "How to loop through an array / array of objects?",
    a: "Use <strong>Array.map()</strong> in JSX. Each item must have a unique <code>key</code> prop.",
    code: `<span class="kw">const</span> users = [
  { id: <span class="num">1</span>, name: <span class="str">"Ali"</span> },
  { id: <span class="num">2</span>, name: <span class="str">"Sara"</span> },
];

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">return</span> (
    <span class="tag">&lt;ul&gt;</span>
      {users.<span class="fn">map</span>(user =&gt; (
        <span class="tag">&lt;li</span> <span class="attr">key</span>={user.id}<span class="tag">&gt;</span>{user.name}<span class="tag">&lt;/li&gt;</span>
      ))}
    <span class="tag">&lt;/ul&gt;</span>
  );
}`
  },
  {
    q: "How to conditionally render an element or text?",
    a: "Use <strong>ternary operator</strong> or <strong>&amp;&amp;</strong> short-circuit inside JSX.",
    code: `<span class="kw">function</span> <span class="fn">App</span>({ isLoggedIn }) {
  <span class="kw">return</span> (
    <span class="tag">&lt;div&gt;</span>
      {isLoggedIn ? <span class="tag">&lt;p&gt;</span>Welcome back!<span class="tag">&lt;/p&gt;</span> : <span class="tag">&lt;p&gt;</span>Please login<span class="tag">&lt;/p&gt;</span>}

      {isLoggedIn &amp;&amp; <span class="tag">&lt;button&gt;</span>Logout<span class="tag">&lt;/button&gt;</span>}
    <span class="tag">&lt;/div&gt;</span>
  );
}`
  },
  {
    q: "How to change styles based on a condition?",
    a: "Use a ternary in the <code>style</code> prop, or use template literals for <code>className</code>.",
    code: `<span class="kw">function</span> <span class="fn">App</span>({ isActive }) {
  <span class="kw">return</span> (
    <span class="tag">&lt;div&gt;</span>
      <span class="cm">// Inline style approach</span>
      <span class="tag">&lt;p</span> <span class="attr">style</span>={{ color: isActive ? <span class="str">"green"</span> : <span class="str">"red"</span> }}<span class="tag">&gt;</span>
        Status
      <span class="tag">&lt;/p&gt;</span>

      <span class="cm">// className approach</span>
      <span class="tag">&lt;p</span> <span class="attr">className</span>={isActive ? <span class="str">"active"</span> : <span class="str">"inactive"</span>}<span class="tag">&gt;</span>
        Status
      <span class="tag">&lt;/p&gt;</span>
    <span class="tag">&lt;/div&gt;</span>
  );
}`
  },
  {
    q: "How to show and hide data based on condition?",
    a: "Toggle a boolean state and conditionally render the element.",
    code: `<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> [visible, setVisible] = <span class="fn">useState</span>(<span class="kw">false</span>);

  <span class="kw">return</span> (
    <span class="tag">&lt;&gt;</span>
      <span class="tag">&lt;button</span> <span class="attr">onClick</span>={() =&gt; <span class="fn">setVisible</span>(v =&gt; !v)}<span class="tag">&gt;</span>Toggle<span class="tag">&lt;/button&gt;</span>
      {visible &amp;&amp; <span class="tag">&lt;p&gt;</span>Now you see me! 👋<span class="tag">&lt;/p&gt;</span>}
    <span class="tag">&lt;/&gt;</span>
  );
}`
  },
  {
    q: "Bind array / array of objects to radio buttons?",
    a: "Map over the array and render an <code>&lt;input type='radio'&gt;</code> for each item. Manage selected value in state.",
    code: `<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;
<span class="kw">const</span> colors = [<span class="str">"Red"</span>, <span class="str">"Green"</span>, <span class="str">"Blue"</span>];

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> [selected, setSelected] = <span class="fn">useState</span>(<span class="str">""</span>);

  <span class="kw">return</span> (
    <span class="tag">&lt;div&gt;</span>
      {colors.<span class="fn">map</span>(c =&gt; (
        <span class="tag">&lt;label</span> <span class="attr">key</span>={c}<span class="tag">&gt;</span>
          <span class="tag">&lt;input</span>
            <span class="attr">type</span>=<span class="str">"radio"</span>
            <span class="attr">value</span>={c}
            <span class="attr">checked</span>={selected === c}
            <span class="attr">onChange</span>={() =&gt; <span class="fn">setSelected</span>(c)}
          <span class="tag">/&gt;</span>
          {c}
        <span class="tag">&lt;/label&gt;</span>
      ))}
      <span class="tag">&lt;p&gt;</span>Selected: {selected}<span class="tag">&lt;/p&gt;</span>
    <span class="tag">&lt;/div&gt;</span>
  );
}`
  },
  {
    q: "Display radio button value selected by user in another textbox?",
    a: "Controlled radio buttons store the selected value in state. Render that state in an input's <code>value</code>.",
    code: `<span class="cm">// Just extends Q12 — use selected state in an input</span>
<span class="tag">&lt;input</span> <span class="attr">value</span>={selected} <span class="attr">readOnly</span> <span class="attr">placeholder</span>=<span class="str">"Selected color shows here"</span> <span class="tag">/&gt;</span>`
  },
  {
    q: "How to call a method when component renders for the first time?",
    a: "Use <strong>useEffect</strong> with an <strong>empty dependency array</strong> <code>[]</code>. This runs once — equivalent to <code>componentDidMount</code>.",
    code: `<span class="kw">import</span> { useEffect } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="fn">useEffect</span>(() =&gt; {
    console.<span class="fn">log</span>(<span class="str">"Component mounted — runs once!"</span>);
  }, []); <span class="cm">// ← empty array = run only on mount</span>

  <span class="kw">return</span> <span class="tag">&lt;p&gt;</span>Hello<span class="tag">&lt;/p&gt;</span>;
}`
  },
  {
    q: "Display keys and values of an object in a loop?",
    a: "Use <strong>Object.entries()</strong> to get [key, value] pairs and <code>.map()</code> over them.",
    code: `<span class="kw">const</span> user = { name: <span class="str">"Zaheer"</span>, age: <span class="num">25</span>, role: <span class="str">"Dev"</span> };

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">return</span> (
    <span class="tag">&lt;ul&gt;</span>
      {Object.<span class="fn">entries</span>(user).<span class="fn">map</span>(([key, value]) =&gt; (
        <span class="tag">&lt;li</span> <span class="attr">key</span>={key}<span class="tag">&gt;</span>
          <span class="tag">&lt;strong&gt;</span>{key}<span class="tag">&lt;/strong&gt;</span>: {value}
        <span class="tag">&lt;/li&gt;</span>
      ))}
    <span class="tag">&lt;/ul&gt;</span>
  );
}`
  },
  {
    q: "How to re-render a component on value change?",
    a: "React automatically re-renders when <strong>state</strong> changes. Call a state setter and the component re-renders with the new value.",
    code: `<span class="kw">import</span> { useState } <span class="kw">from</span> <span class="str">'react'</span>;

<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">const</span> [count, setCount] = <span class="fn">useState</span>(<span class="num">0</span>);

  <span class="kw">return</span> (

const app = document.getElementById("app");

let html = "";
